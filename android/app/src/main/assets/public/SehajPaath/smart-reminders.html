<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="../css/mobile-lock.css">
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#040810">
    <meta name="description" content="Cinematic Alarm — Drag to change time, entire world responds beautifully">
    <title>ਯਾਦ ਕਰਵਾਓ | Cinematic Alarm</title>
    <link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32x32.png">
    <link rel="manifest" href="../manifest.json">
    <link rel="stylesheet" href="cinematic-reminders.css?v=4.0.0">
</head>

<body>

    <!-- ═══════════════ LOADING ═══════════════ -->
    <div class="cine-load" id="ld">
        <div class="load-sun"></div>
        <div class="load-txt">ਵਾਹਿਗੁਰੂ</div>
    </div>

    <!-- ═══════════════ SCENE ═══════════════ -->
    <div class="scene" id="scene">

        <!-- Canvas Sky -->
        <canvas id="skyCanvas"></canvas>

        <!-- Stars (120 generated by JS) -->
        <div class="stars-field" id="sf"></div>

        <!-- Aurora Borealis (night) -->
        <div class="aurora">
            <div class="aurora-band"></div>
            <div class="aurora-band"></div>
            <div class="aurora-band"></div>
        </div>

        <!-- Shooting Stars (night) -->
        <div class="shooting-stars">
            <div class="shooting-star"></div>
            <div class="shooting-star"></div>
            <div class="shooting-star"></div>
        </div>

        <!-- Clouds (7 depth layers) -->
        <div class="cld-layer">
            <div class="cld cld-1"></div>
            <div class="cld cld-2"></div>
            <div class="cld cld-3"></div>
            <div class="cld cld-4"></div>
            <div class="cld cld-5"></div>
            <div class="cld cld-6"></div>
            <div class="cld cld-7"></div>
        </div>

        <!-- SUN with corona + lens flares -->
        <div class="sun-grp">
            <div class="sun-flare-h"></div>
            <div class="sun-flare-v"></div>
            <div class="sun-flare-diag"></div>
            <div class="sun-core"></div>
            <div class="sun-art art1"></div>
            <div class="sun-art art2"></div>
            <div class="sun-art art3"></div>
            <div class="sun-art art4"></div>
        </div>
        <div class="sun-refl"></div>

        <!-- MOON with craters + glow halo -->
        <div class="moon-grp">
            <div class="moon-glow"></div>
            <div class="moon-disk">
                <div class="mcr mcr1"></div>
                <div class="mcr mcr2"></div>
                <div class="mcr mcr3"></div>
            </div>
        </div>

        <!-- Atmosphere -->
        <div class="atmo-haze"></div>
        <div class="horiz-fog"></div>

        <!-- Birds (day) -->
        <div class="birds">
            <div class="bird bird-1"><svg viewBox="0 0 16 6">
                    <path d="M0 3 Q4 0 8 3 Q12 0 16 3" fill="none" stroke="rgba(0,0,0,0.4)" stroke-width="1.2" />
                </svg></div>
            <div class="bird bird-2"><svg viewBox="0 0 16 6">
                    <path d="M0 3 Q4 0 8 3 Q12 0 16 3" fill="none" stroke="rgba(0,0,0,0.35)" stroke-width="1" />
                </svg></div>
            <div class="bird bird-3"><svg viewBox="0 0 16 6">
                    <path d="M0 3 Q4 0 8 3 Q12 0 16 3" fill="none" stroke="rgba(0,0,0,0.3)" stroke-width="1.1" />
                </svg></div>
            <div class="bird bird-4"><svg viewBox="0 0 16 6">
                    <path d="M0 3 Q4 0 8 3 Q12 0 16 3" fill="none" stroke="rgba(0,0,0,0.25)" stroke-width="0.9" />
                </svg></div>
        </div>

        <!-- Fireflies (night) -->
        <div class="fireflies">
            <div class="firefly ff1"></div>
            <div class="firefly ff2"></div>
            <div class="firefly ff3"></div>
            <div class="firefly ff4"></div>
            <div class="firefly ff5"></div>
            <div class="firefly ff6"></div>
            <div class="firefly ff7"></div>
        </div>

        <!-- Snow (deep night) -->
        <div class="snow-layer">
            <div class="snowflake sf1"></div>
            <div class="snowflake sf2"></div>
            <div class="snowflake sf3"></div>
            <div class="snowflake sf4"></div>
            <div class="snowflake sf5"></div>
            <div class="snowflake sf6"></div>
            <div class="snowflake sf7"></div>
            <div class="snowflake sf8"></div>
            <div class="snowflake sf9"></div>
            <div class="snowflake sf10"></div>
        </div>

        <!-- ═══════ LANDSCAPE (4-layer parallax) ═══════ -->
        <div class="landscape">

            <!-- Layer 4 — farthest mountains -->
            <div class="dune-lyr dl4" id="d4">
                <svg viewBox="0 0 1400 320" preserveAspectRatio="none">
                    <path class="dpf" fill="#3a4460" d="M0 320 L0 190 Q50 140 120 165 Q190 190 270 150 Q340 115 430 140
                       Q510 168 590 128 Q670 92 760 118 Q840 148 920 108 Q990 75 1080 102
                       Q1160 128 1240 92 Q1300 68 1400 95 L1400 320Z" />
                </svg>
            </div>

            <!-- Layer 3 — mid mountains -->
            <div class="dune-lyr dl3" id="d3">
                <svg viewBox="0 0 1400 280" preserveAspectRatio="none">
                    <path class="dpm" fill="#5a5a58" d="M0 280 L0 160 Q90 108 190 138 Q280 168 380 118 Q460 78 560 108
                       Q660 148 740 98 Q820 58 910 88 Q990 122 1080 82 Q1160 50 1260 78
                       Q1340 105 1400 80 L1400 280Z" />
                </svg>
            </div>

            <!-- Layer 2 — close hills -->
            <div class="dune-lyr dl2" id="d2">
                <svg viewBox="0 0 1400 240" preserveAspectRatio="none">
                    <path class="dpn" fill="#8a8070" d="M0 240 L0 138 Q110 85 230 118 Q330 148 430 100 Q510 65 620 92
                       Q720 125 810 82 Q900 50 1000 75 Q1100 108 1200 68 Q1300 40 1400 62 L1400 240Z" />
                </svg>
            </div>

            <!-- Layer 1 — closest foreground -->
            <div class="dune-lyr dl1" id="d1">
                <svg viewBox="0 0 1400 200" preserveAspectRatio="none">
                    <path class="dpp" fill="#b0a890" d="M0 200 L0 112 Q140 62 280 98 Q390 130 500 82 Q590 50 700 72
                       Q800 100 900 60 Q990 35 1100 55 Q1200 80 1300 48 Q1380 30 1400 42 L1400 200Z" />
                </svg>
            </div>

            <!-- TREES LEFT -->
            <div class="tgrp tl">
                <svg class="tsvg" width="16" height="38" viewBox="0 0 16 38">
                    <polygon class="ts" points="8,0 0,28 16,28" fill="#3a4a35" />
                    <polygon class="ts" points="8,6 2,26 14,26" fill="#3f5038" />
                    <rect class="tt" x="6" y="28" width="4" height="10" fill="#2a3025" />
                </svg>
                <svg class="tsvg" width="22" height="52" viewBox="0 0 22 52">
                    <polygon class="ts" points="11,0 0,38 22,38" fill="#3a4a35" />
                    <polygon class="ts" points="11,8 3,36 19,36" fill="#3f5038" />
                    <rect class="tt" x="8" y="38" width="6" height="14" fill="#2a3025" />
                </svg>
                <svg class="tsvg" width="14" height="34" viewBox="0 0 14 34">
                    <polygon class="ts" points="7,0 0,25 14,25" fill="#3a4a35" />
                    <rect class="tt" x="5" y="25" width="4" height="9" fill="#2a3025" />
                </svg>
            </div>

            <!-- TREES RIGHT -->
            <div class="tgrp tr">
                <svg class="tsvg" width="12" height="30" viewBox="0 0 12 30">
                    <polygon class="ts" points="6,0 0,22 12,22" fill="#3a4a35" />
                    <rect class="tt" x="4" y="22" width="4" height="8" fill="#2a3025" />
                </svg>
                <svg class="tsvg" width="20" height="48" viewBox="0 0 20 48">
                    <polygon class="ts" points="10,0 0,36 20,36" fill="#3a4a35" />
                    <polygon class="ts" points="10,7 3,34 17,34" fill="#3f5038" />
                    <rect class="tt" x="7" y="36" width="6" height="12" fill="#2a3025" />
                </svg>
                <svg class="tsvg" width="15" height="36" viewBox="0 0 15 36">
                    <polygon class="ts" points="7.5,0 0,27 15,27" fill="#3a4a35" />
                    <rect class="tt" x="5.5" y="27" width="4" height="9" fill="#2a3025" />
                </svg>
            </div>

            <!-- TREES CENTER-LEFT -->
            <div class="tgrp tcl">
                <svg class="tsvg" width="11" height="26" viewBox="0 0 11 26">
                    <polygon class="ts" points="5.5,0 0,19 11,19" fill="#3a4a35" />
                    <rect class="tt" x="3.5" y="19" width="4" height="7" fill="#2a3025" />
                </svg>
            </div>

            <!-- TREES CENTER-RIGHT -->
            <div class="tgrp tcr">
                <svg class="tsvg" width="10" height="22" viewBox="0 0 10 22">
                    <polygon class="ts" points="5,0 0,16 10,16" fill="#3a4a35" />
                    <rect class="tt" x="3" y="16" width="4" height="6" fill="#2a3025" />
                </svg>
            </div>

            <!-- CAMPER VAN (ultra-detailed) -->
            <div class="van">
                <svg viewBox="0 0 85 58" xmlns="http://www.w3.org/2000/svg">
                    <ellipse cx="42" cy="55" rx="40" ry="3" fill="rgba(0,0,0,0.18)" />
                    <rect x="4" y="15" width="58" height="29" rx="5" fill="#6d7f8e" />
                    <rect x="4" y="28" width="58" height="3" rx="1" fill="rgba(255,255,255,0.07)" />
                    <rect x="4" y="38" width="58" height="3" rx="1" fill="#5a6a78" />
                    <path d="M49 15 L49 8 Q49 3 53 3 L65 3 Q69 3 69 8 L69 15" fill="#5c6e7e" />
                    <rect x="6" y="11" width="40" height="3" rx="1.5" fill="#7a8a96" />
                    <rect x="10" y="9" width="2" height="5" rx="1" fill="#7a8a96" />
                    <rect x="22" y="9" width="2" height="5" rx="1" fill="#7a8a96" />
                    <rect x="34" y="9" width="2" height="5" rx="1" fill="#7a8a96" />
                    <rect x="51" y="5" width="15" height="9" rx="2" fill="rgba(140,190,240,0.45)" />
                    <rect x="52" y="6" width="5" height="7" rx="1" fill="rgba(255,255,255,0.1)" />
                    <rect x="9" y="19" width="14" height="9" rx="2" fill="rgba(200,210,230,0.2)" />
                    <rect class="vwg" x="10" y="20" width="12" height="7" rx="1" fill="rgba(255,200,80,0)" />
                    <rect x="27" y="19" width="11" height="9" rx="2" fill="rgba(200,210,230,0.15)" />
                    <rect class="vwg" x="28" y="20" width="9" height="7" rx="1" fill="rgba(255,200,80,0)" />
                    <line x1="42" y1="15" x2="42" y2="42" stroke="rgba(0,0,0,0.08)" stroke-width="1" />
                    <rect x="44" y="28" width="5" height="2" rx="1" fill="rgba(255,255,255,0.08)" />
                    <rect x="2" y="41" width="66" height="3" rx="1.5" fill="#5a6a78" />
                    <rect class="vhl" x="64" y="30" width="5" height="4" rx="1" fill="rgba(255,240,180,0)" />
                    <rect x="4" y="32" width="3" height="3" rx="1" fill="rgba(255,60,40,0.35)" />
                    <circle cx="19" cy="46" r="7" fill="#222" />
                    <circle cx="19" cy="46" r="5" fill="#3a3a3a" />
                    <circle cx="19" cy="46" r="2" fill="#555" />
                    <circle cx="54" cy="46" r="7" fill="#222" />
                    <circle cx="54" cy="46" r="5" fill="#3a3a3a" />
                    <circle cx="54" cy="46" r="2" fill="#555" />
                    <rect x="1" y="40" width="4" height="2" rx="1" fill="#555" />
                    <line x1="14" y1="11" x2="14" y2="2" stroke="#888" stroke-width="0.8" />
                    <circle cx="14" cy="2" r="1" fill="#aaa" />
                </svg>
            </div>

            <!-- Van headlight beam (night) -->
            <div class="van-headlight"></div>

            <!-- BONFIRE (dynamic on/off) -->
            <div class="bonfire-grp">
                <div class="f-outer"></div>
                <div class="f-mid"></div>
                <div class="f-inner"></div>
                <div class="f-logs">
                    <svg viewBox="0 0 24 10" xmlns="http://www.w3.org/2000/svg">
                        <rect x="1" y="3" width="20" height="3.5" rx="1.5" fill="#4a3a28"
                            transform="rotate(-18,11,5)" />
                        <rect x="3" y="4" width="18" height="3.5" rx="1.5" fill="#5a4a35" transform="rotate(14,11,5)" />
                        <rect x="5" y="1.5" width="14" height="2.5" rx="1" fill="#644" transform="rotate(-6,11,3)" />
                        <circle cx="8" cy="6" r="1.5" fill="#3a2a18" />
                        <circle cx="16" cy="5" r="1.2" fill="#3a2a18" />
                    </svg>
                </div>
            </div>
            <div class="f-ground"></div>

            <!-- Embers -->
            <div class="embers">
                <div class="emb"></div>
                <div class="emb"></div>
                <div class="emb"></div>
                <div class="emb"></div>
                <div class="emb"></div>
                <div class="emb"></div>
                <div class="emb"></div>
                <div class="emb"></div>
                <div class="emb"></div>
                <div class="emb"></div>
            </div>

            <!-- Smoke puffs -->
            <div class="smoke-puff"></div>
            <div class="smoke-puff"></div>
            <div class="smoke-puff"></div>

        </div><!-- /landscape -->

    </div><!-- /scene -->

    <!-- ═══════════════ HEADER ═══════════════ -->
    <div class="chdr">
        <button class="hb" id="bk" aria-label="Back">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M15 18l-6-6 6-6" />
            </svg>
        </button>
        <div class="hst">
            <span class="hdot"></span>
            <span class="hcnt" id="cnt">3 active</span>
        </div>
    </div>

    <!-- ═══════════════ TIME ═══════════════ -->
    <div class="time-ov">
        <div class="al-title">Alarm</div>
        <div class="time-dsp">
            <span class="t-hm" id="thm">1:00</span>
            <span class="t-p" id="tp">PM</span>
        </div>
    </div>

    <!-- ═══════════════ DRAG HINT ═══════════════ -->
    <div class="dhint" id="dh">
        <span class="dh-arr">⟵ ⟶</span>
        <span>Drag anywhere to set time</span>
    </div>

    <!-- ═══════════════ MOMENTUM INDICATOR ═══════════════ -->
    <div class="momentum-line">
        <div class="momentum-fill" id="mfill"></div>
    </div>

    <!-- ═══════════════ BOTTOM BAR (single clean row) ═══════════════ -->
    <div class="bbar">
        <div class="crow">
            <button class="cb" id="lb" aria-label="View alarms">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
                    <path d="M13.73 21a2 2 0 0 1-3.46 0" />
                </svg>
            </button>
            <button class="cb" id="spk" aria-label="Sound">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" />
                    <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07" />
                </svg>
            </button>
            <button class="cb" id="sb" aria-label="Locations">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10" />
                    <path
                        d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" />
                </svg>
            </button>
        </div>
        <button class="aapill" id="ab">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M12 5v14M5 12h14" />
            </svg>
            Add Alarm
        </button>
    </div>

    <!-- ═══════════════ ALARMS SHEET ═══════════════ -->
    <div class="as-bd" id="abd"></div>
    <div class="as-sh" id="ash">
        <div class="as-hand"></div>
        <div class="as-hd">
            <span class="as-tt">Your Alarms</span>
            <button class="as-cl" id="acl">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M18 6L6 18M6 6l12 12" />
                </svg>
            </button>
        </div>
        <div class="as-ls" id="als"></div>
    </div>

    <!-- ═══════════════ AUDIO PICKER SHEET ═══════════════ -->
    <div class="as-bd" id="audBd"></div>
    <div class="as-sh" id="audSh">
        <div class="as-hand"></div>
        <div class="as-hd">
            <span class="as-tt">🔔 Alarm Sound</span>
            <button class="as-cl" id="audCl">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M18 6L6 18M6 6l12 12" />
                </svg>
            </button>
        </div>
        <div class="as-ls" id="audLs">
            <!-- Rendered by JS -->
        </div>
    </div>

    <!-- ═══════════════ LOCATION THEME SHEET ═══════════════ -->
    <div class="as-bd" id="locBd"></div>
    <div class="as-sh" id="locSh">
        <div class="as-hand"></div>
        <div class="as-hd">
            <span class="as-tt">🌍 Choose Location</span>
            <button class="as-cl" id="locCl">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M18 6L6 18M6 6l12 12" />
                </svg>
            </button>
        </div>
        <div class="as-ls">
            <div class="loc-grid" id="locGr">
                <!-- Rendered by JS -->
            </div>
        </div>
    </div>

    <!-- TOAST -->
    <div class="tw" id="tw"></div>

    <!-- ═══════════════ SCRIPTS ═══════════════ -->
    <script src="cinematic-reminders.js?v=4.0.0"></script>
    <script src="../lib/alarm-coordinator.js?v=1.0.0"></script>
    <script src="../lib/global-alarm-system.js?v=3.0.0"></script>
    <script src="../lib/ios-android-notifications.js?v=3.0.0"></script>
    <script src="../lib/alarm-persistence.js?v=1.0.0"></script>
    <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw-alarm.js', { scope: '/' }).catch(() => { });</script>
</body>

</html>
