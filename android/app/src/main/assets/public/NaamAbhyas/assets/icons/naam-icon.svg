<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="naamGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9500"/>
      <stop offset="50%" style="stop-color:#FF7A00"/>
      <stop offset="100%" style="stop-color:#E68600"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="32" cy="32" r="30" fill="url(#naamGradient)" opacity="0.2"/>
  <circle cx="32" cy="32" r="26" fill="none" stroke="url(#naamGradient)" stroke-width="2"/>
  
  <!-- Ik Onkar Symbol (Simplified) -->
  <g filter="url(#glow)" transform="translate(32, 32)">
    <text 
      x="0" 
      y="8" 
      font-family="Noto Sans Gurmukhi, sans-serif" 
      font-size="28" 
      fill="url(#naamGradient)" 
      text-anchor="middle"
      font-weight="600">ੴ</text>
  </g>
  
  <!-- Prayer Hands -->
  <path 
    d="M32 48 L28 44 L28 40 Q28 38 30 38 L34 38 Q36 38 36 40 L36 44 Z" 
    fill="url(#naamGradient)" 
    opacity="0.8"/>
</svg>
