<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1170 2532" width="1170" height="2532">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#020205"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg)"/>
  
  <!-- Ik Onkar Symbol -->
  <text x="585" y="1100" 
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
        font-size="300" 
        font-weight="bold"
        fill="#f7c634" 
        text-anchor="middle"
        filter="url(#glow)">ੴ</text>
  
  <!-- App Name -->
  <text x="585" y="1350" 
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
        font-size="120" 
        font-weight="bold"
        fill="#ffffff" 
        text-anchor="middle">ANHAD</text>
  
  <!-- Tagline -->
  <text x="585" y="1450" 
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
        font-size="48" 
        fill="#888888" 
        text-anchor="middle">ਅਨਹਦ • Divine Gurbani</text>
  
  <!-- Loading indicator -->
  <circle cx="585" cy="1700" r="20" fill="none" stroke="#f7c634" stroke-width="4">
    <animate attributeName="stroke-dasharray" values="0 126;126 0;0 126" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
