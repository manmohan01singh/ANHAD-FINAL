<!DOCTYPE html>
<html lang="pa" dir="ltr">
<head>
  <!-- CRITICAL: Theme blocker - MUST run before paint -->
  <script>
(function() {
  try {
    const theme = localStorage.getItem('anhad_theme') || 'light';
    if (theme === 'dark') {
      document.documentElement.classList.add('dark');
      document.documentElement.setAttribute('data-theme', 'dark');
    } else {
      document.documentElement.classList.remove('dark');
      document.documentElement.setAttribute('data-theme', 'light');
    }
  } catch (e) {}
})();
  </script>
  <meta name="color-scheme" content="light dark">
    <link rel="stylesheet" href="../../css/mobile-lock.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#FAF8F5">
  
  <title>Favorites | Gurbani Live</title>
  
  <!-- Global Theme System -->
  <script>
    document.documentElement.setAttribute('data-global-theme', 'force');
  </script>
  <script src="../../lib/global-theme.js"></script>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+Gurmukhi:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/category.css">
</head>

<body>
  <div class="app">
    
    <!-- Header -->
    <header class="header glass">
      <a href="../index.html" class="header-back">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M15 18l-6-6 6-6"/>
        </svg>
      </a>
      <div class="header-title">
        <span class="header-gurmukhi">⭐ Favorites</span>
      </div>
      <div style="width: 40px;"></div>
    </header>

    <!-- Main Content -->
    <main class="category-main">
      
      <!-- Empty State -->
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">⭐</div>
        <h2 class="empty-title">No Favorites Yet</h2>
        <p class="empty-desc">Tap the bookmark icon while reading a Bani to add it to your favorites.</p>
        <a href="../index.html" class="empty-btn">Browse Banis</a>
      </div>
      
      <!-- Favorites List -->
      <div class="bani-list" id="favoritesList" style="display: none;"></div>
      
      <!-- Clear Button -->
      <button class="clear-btn" id="clearFavorites" style="display: none;">
        Clear All Favorites
      </button>

    </main>

  </div>

  <style>
    .empty-state {
      text-align: center;
      padding: var(--space-2xl) var(--space-lg);
    }
    
    .empty-icon {
      font-size: 4rem;
      margin-bottom: var(--space-lg);
      opacity: 0.5;
    }
    
    .empty-title {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: var(--space-sm);
    }
    
    .empty-desc {
      font-size: 0.9375rem;
      color: var(--text-secondary);
      max-width: 280px;
      margin: 0 auto var(--space-xl);
      line-height: 1.5;
    }
    
    .empty-btn {
      display: inline-block;
      padding: var(--space-sm) var(--space-xl);
      background: linear-gradient(160deg, #FFF8F0 0%, #FFF0E0 40%, #FFE8D0 100%);
      color: #000;
      font-weight: 600;
      border: 3px solid rgba(212, 175, 55, 0.5);
      border-radius: 26px;
      box-shadow:
        12px 12px 40px rgba(180, 140, 50, 0.25),
        6px 6px 20px rgba(60, 60, 70, 0.14),
        -6px -6px 20px rgba(255, 255, 255, 0.95),
        -3px -3px 10px rgba(255, 255, 255, 0.85),
        0 0 0 2px rgba(212, 175, 55, 0.3),
        inset 0 2px 4px rgba(255, 255, 255, 1),
        inset 0 -1px 2px rgba(180, 140, 50, 0.1);
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      transform: translateY(0);
    }
    
    .empty-btn:hover {
      transform: translateY(-2px);
      box-shadow:
        16px 16px 50px rgba(180, 140, 50, 0.3),
        8px 8px 25px rgba(60, 60, 70, 0.18),
        -8px -8px 25px rgba(255, 255, 255, 0.95),
        -4px -4px 12px rgba(255, 255, 255, 0.85),
        0 0 0 3px rgba(212, 175, 55, 0.35),
        inset 0 2px 4px rgba(255, 255, 255, 1),
        inset 0 -1px 2px rgba(180, 140, 50, 0.1);
    }
    
    .empty-btn:active {
      transform: scale(0.98) translateY(2px);
      box-shadow:
        inset 5px 5px 15px rgba(60, 60, 70, 0.22),
        inset 2px 2px 8px rgba(60, 60, 70, 0.14),
        inset -3px -3px 10px rgba(255, 255, 255, 0.6),
        0 0 0 2px rgba(212, 175, 55, 0.35),
        2px 2px 8px rgba(60, 60, 70, 0.16);
    }
    
    .clear-btn {
      width: 100%;
      padding: var(--space-md);
      background: linear-gradient(160deg, #FFF5F5 0%, #FFE8E8 40%, #FFE0E0 100%);
      border: 3px solid rgba(220, 100, 120, 0.5);
      border-radius: 24px;
      color: #E11D48;
      font-size: 0.9375rem;
      font-weight: 500;
      margin-top: var(--space-xl);
      box-shadow:
        12px 12px 40px rgba(200, 90, 110, 0.22),
        6px 6px 20px rgba(60, 60, 70, 0.14),
        -6px -6px 20px rgba(255, 255, 255, 0.95),
        -3px -3px 10px rgba(255, 255, 255, 0.85),
        0 0 0 2px rgba(220, 100, 120, 0.3),
        inset 0 2px 4px rgba(255, 255, 255, 1),
        inset 0 -1px 2px rgba(200, 90, 110, 0.1);
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      transform: translateY(0);
    }
    
    .clear-btn:hover {
      transform: translateY(-2px);
      box-shadow:
        16px 16px 50px rgba(200, 90, 110, 0.28),
        8px 8px 25px rgba(60, 60, 70, 0.18),
        -8px -8px 25px rgba(255, 255, 255, 0.95),
        -4px -4px 12px rgba(255, 255, 255, 0.85),
        0 0 0 3px rgba(220, 100, 120, 0.35),
        inset 0 2px 4px rgba(255, 255, 255, 1),
        inset 0 -1px 2px rgba(200, 90, 110, 0.1);
    }
    
    .clear-btn:active {
      transform: scale(0.98) translateY(2px);
      box-shadow:
        inset 5px 5px 15px rgba(60, 60, 70, 0.22),
        inset 2px 2px 8px rgba(60, 60, 70, 0.14),
        inset -3px -3px 10px rgba(255, 255, 255, 0.6),
        0 0 0 2px rgba(220, 100, 120, 0.35),
        2px 2px 8px rgba(60, 60, 70, 0.16);
    }
    
    /* Claymorphism for dynamically added bani items */
    .bani-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px;
      background: linear-gradient(160deg, #FFFFFF 0%, #FAFAFC 40%, #F0F0F5 100%);
      border: 3px solid rgba(255, 255, 255, 0.7);
      border-radius: 24px;
      text-decoration: none;
      color: inherit;
      margin-bottom: 10px;
      box-shadow:
        14px 14px 45px rgba(60, 60, 70, 0.2),
        7px 7px 22px rgba(60, 60, 70, 0.14),
        -7px -7px 22px rgba(255, 255, 255, 0.95),
        -3px -3px 11px rgba(255, 255, 255, 0.85),
        0 0 0 2px rgba(255, 255, 255, 0.6),
        inset 0 2px 4px rgba(255, 255, 255, 1),
        inset 0 -1px 2px rgba(60, 60, 70, 0.06);
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      transform: translateY(0);
    }
    
    .bani-item:hover {
      transform: translateY(-2px);
      box-shadow:
        18px 18px 55px rgba(60, 60, 70, 0.26),
        9px 9px 28px rgba(60, 60, 70, 0.18),
        -9px -9px 28px rgba(255, 255, 255, 0.95),
        -4px -4px 14px rgba(255, 255, 255, 0.85),
        0 0 0 2px rgba(255, 255, 255, 0.6),
        inset 0 2px 4px rgba(255, 255, 255, 1),
        inset 0 -1px 2px rgba(60, 60, 70, 0.06);
    }
    
    .bani-item:active {
      transform: scale(0.98) translateY(3px);
      box-shadow:
        inset 6px 6px 16px rgba(60, 60, 70, 0.22),
        inset 3px 3px 8px rgba(60, 60, 70, 0.14),
        inset -4px -4px 12px rgba(255, 255, 255, 0.6),
        0 0 0 2px rgba(255, 255, 255, 0.4),
        3px 3px 10px rgba(60, 60, 70, 0.16);
    }
  </style>

  <script src="../js/bani-metadata.js"></script>
  
  <!-- OFFLINE-FIRST: Embedded Bani Data for instant loading -->
  <script src="../js/offline-bani-data.js?v=1"></script>
  
  <!-- BaniDB API - now with instant offline-first -->
  <script src="../js/banidb-api.js?v=3"></script>
  
  <!-- Preload Manager for instant navigation -->
  <script src="../js/preload-manager.js?v=1"></script>
  
  <script>
    // Apply saved theme
    const savedTheme = localStorage.getItem('nitnem_theme') || 'dark';
    document.documentElement.setAttribute('data-theme', savedTheme);
    
    // Load favorites
    function loadFavorites() {
      const favorites = JSON.parse(localStorage.getItem('nitnem_favorites') || '[]');
      const emptyState = document.getElementById('emptyState');
      const favoritesList = document.getElementById('favoritesList');
      const clearBtn = document.getElementById('clearFavorites');
      
      if (favorites.length === 0) {
        emptyState.style.display = 'block';
        favoritesList.style.display = 'none';
        clearBtn.style.display = 'none';
        return;
      }
      
      emptyState.style.display = 'none';
      favoritesList.style.display = 'block';
      clearBtn.style.display = 'block';
      
      favoritesList.innerHTML = favorites.map(fav => {
        const meta = BaniMetadata[fav.id] || {};
        return `
          <a href="../reader.html?id=${fav.id}" class="bani-item">
            <span class="bani-icon">${meta.icon || '📖'}</span>
            <div class="bani-content">
              <h3 class="bani-name">${meta.nameGurmukhi || fav.name || 'Bani'}</h3>
              <p class="bani-meta">${meta.nameEnglish || ''}</p>
            </div>
            <svg class="bani-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 18l6-6-6-6"/>
            </svg>
          </a>
        `;
      }).join('');
    }
    
    // Clear favorites
    document.getElementById('clearFavorites').addEventListener('click', () => {
      if (confirm('Remove all favorites?')) {
        localStorage.setItem('nitnem_favorites', '[]');
        loadFavorites();
      }
    });
    
    loadFavorites();
  </script>
</body>
</html>
