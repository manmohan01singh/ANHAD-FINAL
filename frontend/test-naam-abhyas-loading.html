<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naam Abhyas Loading Diagnostic</title>
    <style>
        body {
            font-family: monospace;
            padding: 20px;
            background: #1a1a1a;
            color: #00ff00;
        }
        .log {
            margin: 5px 0;
            padding: 5px;
            border-left: 3px solid #00ff00;
        }
        .error {
            color: #ff0000;
            border-left-color: #ff0000;
        }
        .success {
            color: #00ff00;
            border-left-color: #00ff00;
        }
        .warning {
            color: #ffaa00;
            border-left-color: #ffaa00;
        }
        .info {
            color: #00aaff;
            border-left-color: #00aaff;
        }
        #results {
            margin-top: 20px;
        }
        button {
            background: #00ff00;
            color: #000;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            margin: 5px;
        }
    </style>
</head>
<body>
    <h1>🔍 Naam Abhyas Loading Diagnostic</h1>
    <button onclick="runDiagnostics()">Run Full Diagnostics</button>
    <button onclick="testNaamAbhyas()">Test Naam Abhyas Direct</button>
    <button onclick="clearLogs()">Clear Logs</button>
    <div id="results"></div>

    <script>
        const results = document.getElementById('results');

        function log(message, type = 'info') {
            const div = document.createElement('div');
            div.className = `log ${type}`;
            div.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            results.appendChild(div);
            console.log(message);
        }

        function clearLogs() {
            results.innerHTML = '';
        }

        async function runDiagnostics() {
            clearLogs();
            log('🚀 Starting Naam Abhyas diagnostics...', 'info');

            // Test 1: Check if all required scripts can be loaded
            log('📦 Test 1: Checking script files...', 'info');
            const scripts = [
                '../lib/global-theme.js',
                '../lib/smart-back.js',
                '../lib/page-lifecycle.js',
                '../lib/audio-preload.js',
                '../lib/audio-coordinator.js',
                '../lib/guaranteed-alarm-system.js',
                '../lib/global-mini-player.js',
                '../js/anhad-core.js',
                'components/timer-engine.js',
                'components/notification-engine.js',
                'components/stats-tracker.js',
                'components/audio-manager.js',
                'components/ritual-engine.js',
                '../lib/native-notifications.js',
                '../lib/alarm-coordinator.js',
                '../lib/global-alarm-system.js',
                'naam-abhyas.js'
            ];

            for (const script of scripts) {
                try {
                    const response = await fetch(`NaamAbhyas/${script}`);
                    if (response.ok) {
                        log(`✓ ${script}`, 'success');
                    } else {
                        log(`✗ ${script} - HTTP ${response.status}`, 'error');
                    }
                } catch (e) {
                    log(`✗ ${script} - ${e.message}`, 'error');
                }
            }

            // Test 2: Check localStorage
            log('💾 Test 2: Checking localStorage...', 'info');
            try {
                const config = localStorage.getItem('naam_abhyas_config');
                const history = localStorage.getItem('naam_abhyas_history');
                log(`Config: ${config ? 'EXISTS' : 'MISSING'}`, config ? 'success' : 'warning');
                log(`History: ${history ? 'EXISTS' : 'MISSING'}`, history ? 'success' : 'warning');
            } catch (e) {
                log(`localStorage error: ${e.message}`, 'error');
            }

            // Test 3: Check Service Worker
            log('🔧 Test 3: Checking Service Worker...', 'info');
            if ('serviceWorker' in navigator) {
                try {
                    const registration = await navigator.serviceWorker.getRegistration();
                    if (registration) {
                        log(`✓ Service Worker registered: ${registration.scope}`, 'success');
                        log(`Active: ${registration.active ? 'YES' : 'NO'}`, registration.active ? 'success' : 'warning');
                    } else {
                        log('✗ No Service Worker registration found', 'warning');
                    }
                } catch (e) {
                    log(`Service Worker error: ${e.message}`, 'error');
                }
            } else {
                log('✗ Service Worker not supported', 'error');
            }

            // Test 4: Check IndexedDB
            log('🗄️ Test 4: Checking IndexedDB...', 'info');
            try {
                const dbs = await indexedDB.databases();
                log(`Found ${dbs.length} databases`, 'info');
                dbs.forEach(db => {
                    log(`  - ${db.name} (v${db.version})`, 'info');
                });
            } catch (e) {
                log(`IndexedDB error: ${e.message}`, 'error');
            }

            // Test 5: Check Notification Permission
            log('🔔 Test 5: Checking Notification Permission...', 'info');
            if ('Notification' in window) {
                log(`Permission: ${Notification.permission}`, 
                    Notification.permission === 'granted' ? 'success' : 'warning');
            } else {
                log('✗ Notifications not supported', 'error');
            }

            log('✅ Diagnostics complete!', 'success');
        }

        async function testNaamAbhyas() {
            clearLogs();
            log('🙏 Testing Naam Abhyas direct load...', 'info');

            // Create iframe to load Naam Abhyas
            const iframe = document.createElement('iframe');
            iframe.src = 'NaamAbhyas/naam-abhyas.html';
            iframe.style.width = '100%';
            iframe.style.height = '600px';
            iframe.style.border = '2px solid #00ff00';
            iframe.style.marginTop = '20px';

            // Monitor iframe loading
            iframe.onload = () => {
                log('✓ Iframe loaded', 'success');
                
                // Check if loading screen is still visible after 5 seconds
                setTimeout(() => {
                    try {
                        const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                        const loadingScreen = iframeDoc.getElementById('appLoading');
                        
                        if (loadingScreen) {
                            const isVisible = !loadingScreen.classList.contains('hidden') && 
                                            loadingScreen.style.display !== 'none';
                            
                            if (isVisible) {
                                log('⚠️ LOADING SCREEN STILL VISIBLE AFTER 5 SECONDS!', 'error');
                                log('This indicates the app is stuck on loading', 'error');
                            } else {
                                log('✓ Loading screen hidden successfully', 'success');
                            }
                        } else {
                            log('⚠️ Loading screen element not found', 'warning');
                        }

                        // Check if NaamAbhyas instance exists
                        const naamAbhyas = iframe.contentWindow.naamAbhyas;
                        if (naamAbhyas) {
                            log('✓ NaamAbhyas instance created', 'success');
                            log(`Initialized: ${naamAbhyas.isInitialized}`, 
                                naamAbhyas.isInitialized ? 'success' : 'error');
                        } else {
                            log('✗ NaamAbhyas instance NOT created', 'error');
                        }

                        // Check console errors
                        log('Check browser console for any JavaScript errors', 'info');
                    } catch (e) {
                        log(`Error checking iframe: ${e.message}`, 'error');
                    }
                }, 5000);
            };

            iframe.onerror = () => {
                log('✗ Failed to load iframe', 'error');
            };

            results.appendChild(iframe);
        }

        // Capture console errors
        window.addEventListener('error', (e) => {
            log(`Global Error: ${e.message} at ${e.filename}:${e.lineno}`, 'error');
        });

        window.addEventListener('unhandledrejection', (e) => {
            log(`Unhandled Promise Rejection: ${e.reason}`, 'error');
        });
    </script>
</body>
</html>
