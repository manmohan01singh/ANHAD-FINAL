<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="color-scheme" content="light dark">
  <!-- CRITICAL: Theme blocker - MUST run before paint -->
  <script>
    (function() {
      try {
        const theme = localStorage.getItem('anhad_theme') || 'light';
        if (theme === 'dark') {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      } catch (e) {}
    })();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Animation Test</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #F2F2F7;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }
    
    .test-card {
      background: white;
      border-radius: 16px;
      padding: 30px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      
      /* FADE IN ANIMATION */
      opacity: 0 !important;
      transform: translateY(20px) !important;
      animation: smoothFadeIn 0.8s cubic-bezier(0.19, 1, 0.22, 1) forwards !important;
    }
    
    @keyframes smoothFadeIn {
      to {
        opacity: 1 !important;
        transform: translateY(0) !important;
      }
    }
    
    .test-card:nth-child(1) { animation-delay: 0.1s !important; }
    .test-card:nth-child(2) { animation-delay: 0.2s !important; }
    .test-card:nth-child(3) { animation-delay: 0.3s !important; }
    .test-card:nth-child(4) { animation-delay: 0.4s !important; }
    .test-card:nth-child(5) { animation-delay: 0.5s !important; }
    
    h1 {
      text-align: center;
      color: #1C1C1E;
      margin-bottom: 30px;
    }
    
    .reload-btn {
      display: block;
      margin: 20px auto;
      padding: 15px 30px;
      background: #D4943A;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
    }
    
    /* FIREWORK PARTICLES */
    .firework-particle {
      position: fixed;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      animation: particleExplode 1s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    }
    
    @keyframes particleExplode {
      0% {
        transform: translate(0, 0) scale(1);
        opacity: 1;
      }
      100% {
        transform: translate(var(--tx), var(--ty)) scale(0);
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <h1>🎆 Simple Animation Test</h1>
  
  <button class="reload-btn" onclick="location.reload()">🔄 Reload to See Fade-In</button>
  
  <div class="test-card">
    <h2>Card 1 - Click Me!</h2>
    <p>Should fade in with 0.1s delay</p>
  </div>
  
  <div class="test-card">
    <h2>Card 2 - Click Me!</h2>
    <p>Should fade in with 0.2s delay</p>
  </div>
  
  <div class="test-card">
    <h2>Card 3 - Click Me!</h2>
    <p>Should fade in with 0.3s delay</p>
  </div>
  
  <div class="test-card">
    <h2>Card 4 - Click Me!</h2>
    <p>Should fade in with 0.4s delay</p>
  </div>
  
  <div class="test-card">
    <h2>Card 5 - Click Me!</h2>
    <p>Should fade in with 0.5s delay</p>
  </div>
  
  <script>
    // Simple firework effect on click
    document.addEventListener('click', function(e) {
      const colors = ['#D4943A', '#E8A87C', '#C4842A', '#FFD700'];
      
      for (let i = 0; i < 15; i++) {
        const particle = document.createElement('div');
        particle.className = 'firework-particle';
        
        const angle = (Math.PI * 2 * i) / 15;
        const distance = 100;
        const tx = Math.cos(angle) * distance;
        const ty = Math.sin(angle) * distance;
        
        particle.style.left = e.clientX + 'px';
        particle.style.top = e.clientY + 'px';
        particle.style.background = colors[Math.floor(Math.random() * colors.length)];
        particle.style.setProperty('--tx', tx + 'px');
        particle.style.setProperty('--ty', ty + 'px');
        
        document.body.appendChild(particle);
        
        setTimeout(() => particle.remove(), 1000);
      }
    });
    
    console.log('✨ Animation test loaded');
    console.log('🎆 Click anywhere to see fireworks');
  </script>
</body>
</html>
