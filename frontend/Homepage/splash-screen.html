<!DOCTYPE html>
<html lang="en">
<head>
  <!-- CRITICAL: Theme blocker - MUST run before paint -->
  <script>
(function() {
  try {
    const theme = localStorage.getItem('anhad_theme') || 'light';
    if (theme === 'dark') {
      document.documentElement.classList.add('dark');
      document.documentElement.setAttribute('data-theme', 'dark');
    } else {
      document.documentElement.classList.remove('dark');
      document.documentElement.setAttribute('data-theme', 'light');
    }
  } catch (e) {}
})();
  </script>
  <meta name="color-scheme" content="light dark">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <title>ANHAD</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #000000;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Animated gradient background */
        .splash-bg {
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at center,
                #1a1a2e 0%,
                #0f0f1a 50%,
                #000000 100%
            );
            animation: bgPulse 4s ease-in-out infinite;
        }

        @keyframes bgPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }

        /* Golden rays */
        .rays {
            position: fixed;
            inset: 0;
            background: conic-gradient(
                from 0deg at 50% 50%,
                transparent 0deg,
                rgba(212, 148, 58, 0.15) 30deg,
                transparent 60deg,
                rgba(212, 148, 58, 0.15) 90deg,
                transparent 120deg,
                rgba(212, 148, 58, 0.15) 150deg,
                transparent 180deg,
                rgba(212, 148, 58, 0.15) 210deg,
                transparent 240deg,
                rgba(212, 148, 58, 0.15) 270deg,
                transparent 300deg,
                rgba(212, 148, 58, 0.15) 330deg,
                transparent 360deg
            );
            animation: raysRotate 30s linear infinite;
            opacity: 0.4;
        }

        @keyframes raysRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Main container */
        .splash-container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 60px;
        }

        /* Ik Onkar symbol */
        .ik-onkar {
            font-family: 'Noto Sans Gurmukhi', sans-serif;
            font-size: 180px;
            font-weight: 700;
            color: transparent;
            background: linear-gradient(135deg,
                #FFD700 0%,
                #FFA500 25%,
                #FFD700 50%,
                #FFA500 75%,
                #FFD700 100%
            );
            background-size: 200% 200%;
            -webkit-background-clip: text;
            background-clip: text;
            animation: 
                symbolReveal 1.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards,
                shimmer 3s ease-in-out infinite;
            opacity: 0;
            transform: scale(0.5) rotate(-20deg);
            text-shadow: 
                0 0 80px rgba(255, 215, 0, 0.8),
                0 0 120px rgba(255, 165, 0, 0.6),
                0 0 160px rgba(255, 215, 0, 0.4);
            filter: drop-shadow(0 20px 40px rgba(255, 215, 0, 0.5));
        }

        @keyframes symbolReveal {
            to {
                opacity: 1;
                transform: scale(1) rotate(0deg);
            }
        }

        @keyframes shimmer {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        /* ANHAD text */
        .anhad-text {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: 12px;
            color: transparent;
            background: linear-gradient(90deg,
                #D4943A 0%,
                #E8A838 50%,
                #D4943A 100%
            );
            background-size: 200% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            animation: 
                textReveal 1s ease 0.8s forwards,
                textShimmer 2s ease-in-out 1.8s infinite;
            opacity: 0;
            transform: translateY(30px);
            text-shadow: 0 0 40px rgba(212, 148, 58, 0.6);
        }

        @keyframes textReveal {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes textShimmer {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        /* Gurmukhi subtitle */
        .gurmukhi-text {
            font-family: 'Noto Sans Gurmukhi', sans-serif;
            font-size: 24px;
            font-weight: 600;
            color: rgba(212, 148, 58, 0.9);
            letter-spacing: 2px;
            opacity: 0;
            animation: fadeIn 1s ease 1.3s forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* Loading dots */
        .loading-dots {
            display: flex;
            gap: 12px;
            margin-top: 40px;
            opacity: 0;
            animation: fadeIn 0.8s ease 1.8s forwards;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: linear-gradient(135deg, #D4943A, #E8A838);
            box-shadow: 0 0 20px rgba(212, 148, 58, 0.6);
            animation: dotPulse 1.4s ease-in-out infinite;
        }

        .dot:nth-child(1) { animation-delay: 0s; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dotPulse {
            0%, 100% { 
                transform: scale(1); 
                opacity: 1; 
            }
            50% { 
                transform: scale(1.5); 
                opacity: 0.5; 
            }
        }

        /* Fade out animation */
        .splash-container.fade-out {
            animation: fadeOut 0.8s ease forwards;
        }

        @keyframes fadeOut {
            to {
                opacity: 0;
                transform: scale(0.95);
            }
        }

        /* Mobile adjustments */
        @media (max-width: 768px) {
            .ik-onkar {
                font-size: 120px;
            }
            .anhad-text {
                font-size: 32px;
                letter-spacing: 8px;
            }
            .gurmukhi-text {
                font-size: 18px;
            }
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Gurmukhi:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="splash-bg"></div>
    <div class="rays"></div>
    
    <div class="splash-container" id="splashContainer">
        <div class="ik-onkar">ੴ</div>
        <div class="anhad-text">ANHAD</div>
        <div class="gurmukhi-text">ਅਨਹਦ</div>
        <div class="loading-dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>

    <script>
        // Redirect to main page after 3 seconds
        setTimeout(() => {
            document.getElementById('splashContainer').classList.add('fade-out');
            setTimeout(() => {
                window.location.href = 'ios-homepage.html';
            }, 800);
        }, 3000);
    </script>
</body>
</html>
