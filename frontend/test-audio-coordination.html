<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Coordination Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: white;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2rem;
        }

        .test-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .player-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .player-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 15px;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .player-card.playing {
            border-color: #10b981;
            background: rgba(16, 185, 129, 0.1);
        }

        .player-name {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.9rem;
            margin-bottom: 15px;
        }

        .status.playing {
            background: #10b981;
        }

        .status.paused {
            background: #6b7280;
        }

        button {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .log-container {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 20px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
        }

        .log-entry {
            margin-bottom: 8px;
            padding: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 6px;
        }

        .log-time {
            opacity: 0.6;
            margin-right: 10px;
        }

        .success {
            background: rgba(16, 185, 129, 0.2);
            border-left: 4px solid #10b981;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .warning {
            background: rgba(239, 68, 68, 0.2);
            border-left: 4px solid #ef4444;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 Audio Coordination Test</h1>

        <div class="test-card">
            <h2 style="margin-bottom: 20px;">Test: Only One Audio Plays at a Time</h2>
            
            <div class="player-controls">
                <div class="player-card" id="darbar-card">
                    <div class="player-name">🕌 Darbar Sahib</div>
                    <div class="status paused" id="darbar-status">Paused</div>
                    <button onclick="playDarbar()">▶️ Play Darbar</button>
                </div>

                <div class="player-card" id="amritvela-card">
                    <div class="player-name">🌅 Amritvela</div>
                    <div class="status paused" id="amritvela-status">Paused</div>
                    <button onclick="playAmritvela()">▶️ Play Amritvela</button>
                </div>
            </div>

            <div style="display: flex; gap: 15px; margin-bottom: 20px;">
                <button onclick="pauseAll()" style="background: rgba(239, 68, 68, 0.3);">
                    ⏸️ Pause All
                </button>
                <button onclick="checkStatus()">
                    🔍 Check Status
                </button>
            </div>

            <div id="alert-container"></div>
        </div>

        <div class="test-card">
            <h2 style="margin-bottom: 20px;">📝 Coordination Logs</h2>
            <div class="log-container" id="log-container">
                <div class="log-entry">
                    <span class="log-time">[--:--:--]</span>
                    Waiting for test...
                </div>
            </div>
        </div>
    </div>

    <script src="lib/audio-coordinator.js"></script>
    <script src="lib/persistent-audio.js"></script>
    <script src="lib/global-mini-player.js"></script>

    <script>
        function log(message) {
            const container = document.getElementById('log-container');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            
            const time = new Date().toLocaleTimeString();
            entry.innerHTML = `<span class="log-time">[${time}]</span>${message}`;
            
            container.insertBefore(entry, container.firstChild);
            
            // Keep only last 50 entries
            while (container.children.length > 50) {
                container.removeChild(container.lastChild);
            }
        }

        function showAlert(message, type = 'success') {
            const container = document.getElementById('alert-container');
            const alert = document.createElement('div');
            alert.className = type;
            alert.textContent = message;
            container.appendChild(alert);
            
            setTimeout(() => {
                alert.remove();
            }, 5000);
        }

        function updateUI() {
            const currentlyPlaying = window.AudioCoordinator?.getCurrentlyPlaying();
            
            // Update Darbar card
            const darbarCard = document.getElementById('darbar-card');
            const darbarStatus = document.getElementById('darbar-status');
            if (currentlyPlaying === 'GlobalMiniPlayer') {
                darbarCard.classList.add('playing');
                darbarStatus.textContent = 'Playing';
                darbarStatus.className = 'status playing';
            } else {
                darbarCard.classList.remove('playing');
                darbarStatus.textContent = 'Paused';
                darbarStatus.className = 'status paused';
            }

            // Update Amritvela card
            const amritvelaCard = document.getElementById('amritvela-card');
            const amritvelaStatus = document.getElementById('amritvela-status');
            if (currentlyPlaying === 'AnhadAudio') {
                amritvelaCard.classList.add('playing');
                amritvelaStatus.textContent = 'Playing';
                amritvelaStatus.className = 'status playing';
            } else {
                amritvelaCard.classList.remove('playing');
                amritvelaStatus.textContent = 'Paused';
                amritvelaStatus.className = 'status paused';
            }
        }

        function playDarbar() {
            log('🕌 User clicked: Play Darbar Sahib');
            
            // Use global mini player to play Darbar
            if (window.GMP && window.GMP.play) {
                window.GMP.play('darbar');
                log('✅ Darbar Sahib started via GlobalMiniPlayer');
            } else {
                log('❌ GlobalMiniPlayer not available');
            }
            
            setTimeout(() => {
                updateUI();
                checkCoordination();
            }, 500);
        }

        function playAmritvela() {
            log('🌅 User clicked: Play Amritvela');
            
            // Use persistent audio to play Amritvela
            if (window.AnhadAudio && window.AnhadAudio.play) {
                window.AnhadAudio.play('amritvela');
                log('✅ Amritvela started via AnhadAudio');
            } else {
                log('❌ AnhadAudio not available');
            }
            
            setTimeout(() => {
                updateUI();
                checkCoordination();
            }, 500);
        }

        function pauseAll() {
            log('⏸️ User clicked: Pause All');
            
            if (window.AudioCoordinator) {
                window.AudioCoordinator.pauseAll();
                log('✅ All audio paused via AudioCoordinator');
            }
            
            setTimeout(updateUI, 200);
        }

        function checkStatus() {
            log('🔍 Checking coordination status...');
            
            if (!window.AudioCoordinator) {
                log('❌ AudioCoordinator not loaded!');
                showAlert('AudioCoordinator not available!', 'warning');
                return;
            }

            const registered = window.AudioCoordinator.getRegisteredPlayers();
            const currentlyPlaying = window.AudioCoordinator.getCurrentlyPlaying();
            
            log(`📊 Registered players: ${registered.join(', ')}`);
            log(`🎵 Currently playing: ${currentlyPlaying || 'None'}`);
            
            if (registered.length === 2) {
                showAlert('✅ Both players registered with AudioCoordinator', 'success');
            } else {
                showAlert(`⚠️ Only ${registered.length} player(s) registered`, 'warning');
            }
            
            updateUI();
        }

        function checkCoordination() {
            const currentlyPlaying = window.AudioCoordinator?.getCurrentlyPlaying();
            
            if (!currentlyPlaying) {
                log('ℹ️ No audio currently playing');
                return;
            }

            // Check if only one is playing
            const anhadPlaying = window.AnhadAudio?.isPlaying();
            const gmpPlaying = window.GMP?.isPlaying?.();
            
            const playingCount = (anhadPlaying ? 1 : 0) + (gmpPlaying ? 1 : 0);
            
            if (playingCount === 1) {
                log(`✅ PASS: Only one audio playing (${currentlyPlaying})`);
                showAlert('✅ Coordination working! Only one audio playing.', 'success');
            } else if (playingCount > 1) {
                log(`❌ FAIL: Multiple audios playing simultaneously!`);
                showAlert('❌ FAIL: Both audios are playing!', 'warning');
            }
        }

        // Auto-update UI every second
        setInterval(updateUI, 1000);

        // Initial status check
        setTimeout(() => {
            log('🎵 Audio Coordination Test loaded');
            checkStatus();
        }, 1000);
    </script>
</body>
</html>
