  <!-- CRITICAL: Theme blocker - MUST run before paint -->
  <script>
(function() {
  try {
    const theme = localStorage.getItem('anhad_theme') || 'light';
    const html = document.documentElement;
    if (theme === 'dark') {
      html.classList.add('dark', 'dark-mode');
      html.setAttribute('data-theme', 'dark');
      html.style.colorScheme = 'dark';
    } else {
      html.classList.remove('dark', 'dark-mode');
      html.setAttribute('data-theme', 'light');
      html.style.colorScheme = 'light';
    }
  } catch (e) {}
})();
  </script>

<body>

  <!-- Scripts -->
  <script src="../lib/user-stats.js"></script>
  <script src="../lib/unified-progress-tracker.js"></script>
  <script src="../lib/kirtan-listening-tracker.js"></script>
  <script src="dashboard-analytics.js"></script>
  <script src="dashboard-complete-fix.js"></script>
  <script>
    (function() {
      'use strict';
      
      function updateDashboard() {
        if (!window.AnhadStats) {
          setTimeout(updateDashboard, 100);
          return;
        }
        
        const summary = AnhadStats.getSummary();
        
        // Streak
        document.getElementById('streakCount').textContent = summary.currentStreak;
        document.getElementById('freezeCount').textContent = summary.freezesAvailable;
        
        // Stats
        document.getElementById('totalHours').textContent = summary.totalListeningHours;
        document.getElementById('totalPages').textContent = summary.totalPagesRead;
        document.getElementById('totalNitnem').textContent = summary.totalNitnemCompleted;
        document.getElementById('totalDays').textContent = summary.totalDaysActive;
        
        // Goals
        renderGoals(summary.goals);
        
        // Milestones
        updateMilestones(summary.milestones);
      }
      
      function renderGoals(goals) {
        const container = document.getElementById('goalsList');
        const goalConfig = {
          listenMinutes: { icon: 'fas fa-headphones', label: 'Listen to Kirtan', color: 'gold', unit: 'min' },
          readPages: { icon: 'fas fa-book-open', label: 'Read Gurbani', color: 'blue', unit: 'Ang' },
          completeNitnem: { icon: 'fas fa-sun', label: 'Complete Nitnem', color: 'green', unit: '' },
          naamAbhyas: { icon: 'fas fa-om', label: 'Naam Simran', color: 'purple', unit: 'session' }
        };
        
        // Get Nitnem progress for better display
        const nitnemLog = JSON.parse(localStorage.getItem('nitnemTracker_nitnemLog') || '{}');
        const selectedBanis = JSON.parse(localStorage.getItem('nitnemTracker_selectedBanis') || '{"amritvela":[],"rehras":[],"sohila":[]}');
        const today = new Date().toLocaleDateString('en-CA');
        const totalBanis = (selectedBanis.amritvela?.length || 0) + (selectedBanis.rehras?.length || 0) + (selectedBanis.sohila?.length || 0);
        const todayLog = nitnemLog[today];
        let completedBanis = 0;
        if (todayLog) {
          completedBanis = (todayLog.amritvela?.length || 0) + (todayLog.rehras?.length || 0) + (todayLog.sohila?.length || 0);
        }
        
        // Check if Nitnem is fully complete (all selected banis done)
        const isNitnemComplete = totalBanis > 0 && completedBanis === totalBanis;
        
        container.innerHTML = Object.entries(goals)
          .filter(([_, goal]) => goal.enabled)
          .map(([key, goal]) => {
            const config = goalConfig[key];
            
            // For Nitnem, override with actual completion status
            let isComplete = goal.complete;
            if (key === 'completeNitnem') {
              isComplete = isNitnemComplete;
            }
            
            // Calculate percentage properly
            let percent = 0;
            if (goal.target > 0) {
              percent = Math.min(100, Math.round((goal.current / goal.target) * 100));
            }
            
            // Special handling for Nitnem to show X/Y banis
            let statusText = `${goal.current}/${goal.target} ${config.unit}`;
            if (key === 'completeNitnem' && totalBanis > 0) {
              statusText = `${completedBanis}/${totalBanis} banis`;
              // Recalculate percentage for Nitnem based on actual banis
              percent = totalBanis > 0 ? Math.min(100, Math.round((completedBanis / totalBanis) * 100)) : 0;
            }
            
            return `
              <div class="goal-card ${isComplete ? 'goal-card--complete' : ''}">
                <div class="goal-card__icon bg-${config.color}">
                  <i class="${config.icon}"></i>
                </div>
                <div class="goal-card__content">
                  <div class="goal-card__header-row">
                    <div class="goal-card__title">${config.label}</div>
                    <div class="goal-card__status">${statusText}</div>
                  </div>
                  <div class="goal-card__progress-wrap">
                    <div class="goal-card__fill bg-${config.color}" style="width: ${percent}%"></div>
                  </div>
                </div>
                ${isComplete ? '<div class="goal-card__check"><i class="fas fa-check"></i></div>' : ''}
              </div>
            `;
          }).join('');
      }
      
      function updateMilestones(milestones) {
        const container = document.getElementById('milestones');
        const milestoneElements = container.querySelectorAll('.milestone');
        
        milestoneElements.forEach(el => {
          const days = parseInt(el.dataset.days);
          const key = `day${days}`;
          if (milestones[key]) {
            el.classList.add('milestone--achieved');
          }
        });
      }
      
      function renderNitnemProgressChart() {
        const container = document.getElementById('nitnemProgressChart');
        if (!container) return;
        
        // Get Nitnem log from localStorage
        const nitnemLog = JSON.parse(localStorage.getItem('nitnemTracker_nitnemLog') || '{}');
        const selectedBanis = JSON.parse(localStorage.getItem('nitnemTracker_selectedBanis') || '{"amritvela":[],"rehras":[],"sohila":[]}');
        
        // Calculate total banis expected per day
        const totalBanisPerDay = (selectedBanis.amritvela?.length || 0) + 
                                  (selectedBanis.rehras?.length || 0) + 
                                  (selectedBanis.sohila?.length || 0);
        
        if (totalBanisPerDay === 0) {
          container.innerHTML = `
            <div class="chart-empty">
              <div class="chart-empty__icon">📿</div>
              <div class="chart-empty__text">Start tracking your Nitnem to see progress here</div>
            </div>
          `;
          return;
        }
        
        // Get last 6 days including today
        const days = [];
        const today = new Date();
        const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
        
        for (let i = 5; i >= 0; i--) {
          const date = new Date(today);
          date.setDate(date.getDate() - i);
          const dateStr = date.toLocaleDateString('en-CA'); // YYYY-MM-DD
          const dayName = dayNames[date.getDay()];
          const isToday = i === 0;
          
          // Get completed banis for this day
          const dayData = nitnemLog[dateStr];
          let completedBanis = 0;
          
          if (dayData) {
            completedBanis = (dayData.amritvela?.length || 0) + 
                            (dayData.rehras?.length || 0) + 
                            (dayData.sohila?.length || 0);
          }
          
          const percentage = totalBanisPerDay > 0 ? (completedBanis / totalBanisPerDay) * 100 : 0;
          const isComplete = completedBanis === totalBanisPerDay && totalBanisPerDay > 0;
          
          days.push({
            dateStr,
            dayName,
            isToday,
            completed: completedBanis,
            total: totalBanisPerDay,
            percentage,
            isComplete
          });
        }
        
        // Render chart
        const barsHTML = days.map(day => `
          <div class="chart-bar ${day.isToday ? 'chart-bar--today' : ''} ${day.isComplete ? 'chart-bar--complete' : 'chart-bar--incomplete'}">
            <div class="chart-bar__column">
              <div class="chart-bar__fill" style="height: ${day.percentage}%"></div>
              <div class="chart-bar__value">${day.completed}/${day.total}</div>
            </div>
            <div class="chart-bar__label">${day.isToday ? 'Today' : day.dayName}</div>
          </div>
        `).join('');
        
        container.innerHTML = `
          <div class="chart-bars">
            ${barsHTML}
          </div>
          <div class="chart-legend">
            <div class="chart-legend__item">
              <div class="chart-legend__dot chart-legend__dot--complete"></div>
              <span>Complete</span>
            </div>
            <div class="chart-legend__item">
              <div class="chart-legend__dot chart-legend__dot--incomplete"></div>
              <span>In Progress</span>
            </div>
          </div>
        `;
      }
      
      // Initialize
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', () => {
          updateDashboard();
          renderNitnemProgressChart();
        });
      } else {
        updateDashboard();
        renderNitnemProgressChart();
      }
      
      // Listen for stats updates dynamically
      window.addEventListener('statsUpdated', updateDashboard);
      window.addEventListener('streakUpdated', updateDashboard);
      window.addEventListener('goalsUpdated', updateDashboard);
      window.addEventListener('dashboardRefresh', () => {
        updateDashboard();
        renderNitnemProgressChart();
      });
      
      // Listen for Nitnem updates
      window.addEventListener('nitnemUpdated', renderNitnemProgressChart);
      
      // TEST: Manual kirtan tracking test - press K to add 1 minute
      window.addEventListener('keydown', (e) => {
        if (e.key === 'k' || e.key === 'K') {
          console.log('[Test] Adding 1 minute of kirtan listening...');
          
          // Direct sync to DashboardAnalytics
          if (window.DashboardAnalytics) {
            window.DashboardAnalytics.updateDailyData('listen', 1);
            console.log('[Test] ✅ Synced to DashboardAnalytics');
          }
          
          // Also update goals
          if (window.AnhadStats) {
            window.AnhadStats.addListeningTime(1);
            console.log('[Test] ✅ Synced to AnhadStats');
          }
          
          // Force refresh
          window.dispatchEvent(new CustomEvent('statsUpdated'));
          window.dispatchEvent(new CustomEvent('dashboardRefresh'));
          
          alert('✅ Added 1 minute of kirtan! Check graph and progress card.');
        }
      });
    })();
  </script>
  
  <!-- Theme Icon Update Script -->
  <script>
    (function() {
      const themeIcon = document.getElementById('themeIcon');
      
      function updateThemeIcon() {
        if (!themeIcon || !window.AnhadTheme) return;
        const isDark = window.AnhadTheme.isDark();
        themeIcon.className = isDark ? 'fas fa-moon' : 'fas fa-sun';
      }
      
      // Update icon on page load
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', updateThemeIcon);
      } else {
        updateThemeIcon();
      }
      
      // Listen for theme changes
      window.addEventListener('themechange', updateThemeIcon);
    })();
  </script>
</body>
