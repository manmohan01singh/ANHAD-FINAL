<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="color-scheme" content="light dark">
  <!-- CRITICAL: Theme blocker - MUST run before paint -->
  <script>
    (function() {
      try {
        const theme = localStorage.getItem('anhad_theme') || 'light';
        if (theme === 'dark') {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      } catch (e) {}
    })();
  </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test BaniDB API</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .test-box {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            opacity: 0.9;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            font-family: monospace;
            font-size: 14px;
            white-space: pre-wrap;
            word-wrap: break-word;
            max-height: 400px;
            overflow-y: auto;
        }
        .success {
            color: #28a745;
            font-weight: bold;
        }
        .error {
            color: #dc3545;
            font-weight: bold;
        }
        .info {
            color: #007bff;
        }
    </style>
</head>
<body>
    <div class="test-box">
        <h1>🧪 BaniDB API Test</h1>
        <p>Test if the BaniDB API is accessible from your browser</p>
        
        <button onclick="testDirectAPI()">Test Direct API</button>
        <button onclick="testBackendProxy()">Test Backend Proxy</button>
        <button onclick="testAng1()">Test Ang 1</button>
        <button onclick="clearResults()">Clear</button>
        
        <div id="result" class="result"></div>
    </div>

    <script>
        const log = (message, type = 'info') => {
            const result = document.getElementById('result');
            const timestamp = new Date().toLocaleTimeString();
            const className = type === 'success' ? 'success' : type === 'error' ? 'error' : 'info';
            result.innerHTML += `<span class="${className}">[${timestamp}] ${message}</span>\n`;
            result.scrollTop = result.scrollHeight;
        };

        const clearResults = () => {
            document.getElementById('result').innerHTML = '';
        };

        async function testDirectAPI() {
            log('Testing direct BaniDB API...', 'info');
            log('URL: https://api.banidb.com/v2/angs/1/G', 'info');
            
            try {
                const response = await fetch('https://api.banidb.com/v2/angs/1/G', {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json'
                    },
                    mode: 'cors'
                });
                
                log(`Response Status: ${response.status} ${response.statusText}`, 
                    response.ok ? 'success' : 'error');
                
                if (response.ok) {
                    const data = await response.json();
                    log(`✅ SUCCESS! Received ${data.page?.length || 0} lines`, 'success');
                    log(`Sample data: ${JSON.stringify(data.page?.[0], null, 2).substring(0, 200)}...`, 'info');
                } else {
                    log(`❌ FAILED: ${response.statusText}`, 'error');
                }
            } catch (error) {
                log(`❌ ERROR: ${error.message}`, 'error');
                log(`Error Type: ${error.name}`, 'error');
                if (error.message.includes('CORS')) {
                    log('⚠️ CORS issue detected', 'error');
                }
            }
        }

        async function testBackendProxy() {
            log('Testing backend proxy...', 'info');
            log('URL: /api/banidb/angs/1/G', 'info');
            
            try {
                const response = await fetch('/api/banidb/angs/1/G', {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json'
                    }
                });
                
                log(`Response Status: ${response.status} ${response.statusText}`, 
                    response.ok ? 'success' : 'error');
                
                if (response.ok) {
                    const data = await response.json();
                    log(`✅ SUCCESS! Backend proxy working`, 'success');
                    log(`Received ${data.page?.length || 0} lines`, 'success');
                } else {
                    log(`❌ FAILED: Backend proxy not available`, 'error');
                    log('This is OK if backend is not running', 'info');
                }
            } catch (error) {
                log(`❌ ERROR: ${error.message}`, 'error');
                log('Backend proxy not available (this is OK)', 'info');
            }
        }

        async function testAng1() {
            log('Testing Ang 1 with retry logic...', 'info');
            
            const testWithRetry = async (url, attempt = 1) => {
                try {
                    log(`Attempt ${attempt}/3...`, 'info');
                    
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 15000);
                    
                    const response = await fetch(url, {
                        method: 'GET',
                        headers: {
                            'Accept': 'application/json'
                        },
                        signal: controller.signal,
                        mode: 'cors'
                    });
                    
                    clearTimeout(timeoutId);
                    
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }
                    
                    const data = await response.json();
                    log(`✅ SUCCESS on attempt ${attempt}!`, 'success');
                    log(`Lines received: ${data.page?.length || 0}`, 'success');
                    log(`First line: ${data.page?.[0]?.line?.gurmukhi || 'N/A'}`, 'info');
                    return data;
                    
                } catch (error) {
                    log(`Attempt ${attempt} failed: ${error.message}`, 'error');
                    
                    if (attempt < 3) {
                        log(`Retrying in 1 second...`, 'info');
                        await new Promise(resolve => setTimeout(resolve, 1000));
                        return testWithRetry(url, attempt + 1);
                    } else {
                        log(`❌ All attempts failed`, 'error');
                        throw error;
                    }
                }
            };
            
            try {
                await testWithRetry('https://api.banidb.com/v2/angs/1/G');
            } catch (error) {
                log(`Final error: ${error.message}`, 'error');
            }
        }

        // Auto-run test on load
        window.addEventListener('load', () => {
            log('🚀 Page loaded. Click buttons to test API', 'info');
            log('---', 'info');
        });
    </script>
</body>
</html>
