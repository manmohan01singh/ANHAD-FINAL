<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Kirtan Tracking</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            margin: 0;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            color: #667eea;
            margin-bottom: 20px;
        }
        
        .btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin: 10px 5px;
            width: calc(50% - 10px);
        }
        
        .btn:hover {
            background: #5568d3;
        }
        
        .btn.danger {
            background: #dc3545;
        }
        
        .btn.success {
            background: #28a745;
        }
        
        .status {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
        }
        
        .status h3 {
            margin-top: 0;
            color: #333;
        }
        
        .log {
            background: #2d2d2d;
            color: #f8f8f2;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
            margin-top: 20px;
        }
        
        .log-entry {
            margin: 5px 0;
            padding: 5px;
            border-left: 3px solid #667eea;
            padding-left: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎧 Kirtan Tracking Test</h1>
        
        <div class="status">
            <h3>Current Status</h3>
            <p><strong>Tracking:</strong> <span id="trackingStatus">Not Started</span></p>
            <p><strong>Total Time:</strong> <span id="totalTime">0</span> minutes</p>
            <p><strong>Dashboard Synced:</strong> <span id="syncStatus">No</span></p>
        </div>
        
        <button class="btn success" onclick="startTracking()">▶️ Start Tracking</button>
        <button class="btn danger" onclick="stopTracking()">⏹️ Stop Tracking</button>
        
        <button class="btn" onclick="addMinute()">➕ Add 1 Minute</button>
        <button class="btn" onclick="add5Minutes()">➕ Add 5 Minutes</button>
        
        <button class="btn" onclick="checkDashboard()">📊 Check Dashboard Data</button>
        <button class="btn" onclick="clearData()">🗑️ Clear All Data</button>
        
        <div class="log" id="log"></div>
    </div>
    
    <!-- Load tracking scripts -->
    <script src="lib/user-stats.js"></script>
    <script src="lib/unified-progress-tracker.js"></script>
    <script src="lib/kirtan-listening-tracker.js"></script>
    
    <script>
        let testMinutes = 0;
        
        function log(message) {
            const logDiv = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logDiv.insertBefore(entry, logDiv.firstChild);
        }
        
        function updateStatus() {
            const isTracking = window.KirtanListeningTracker?.isTracking() || false;
            const time = window.KirtanListeningTracker?.getListeningTime() || testMinutes;
            
            document.getElementById('trackingStatus').textContent = isTracking ? '✅ Active' : '⏸️ Stopped';
            document.getElementById('totalTime').textContent = time;
            
            // Check if synced to dashboard
            const today = new Date().toLocaleDateString('en-CA');
            const analytics = JSON.parse(localStorage.getItem('anhad_daily_analytics') || '{}');
            const todayData = analytics[today];
            
            if (todayData && todayData.listenMinutes > 0) {
                document.getElementById('syncStatus').textContent = `✅ Yes (${todayData.listenMinutes} min)`;
            } else {
                document.getElementById('syncStatus').textContent = '❌ No';
            }
        }
        
        function startTracking() {
            if (window.KirtanListeningTracker) {
                window.KirtanListeningTracker.startListening();
                log('✅ Started tracking');
                updateStatus();
            } else {
                log('❌ KirtanListeningTracker not loaded');
            }
        }
        
        function stopTracking() {
            if (window.KirtanListeningTracker) {
                window.KirtanListeningTracker.stopListening();
                log('⏹️ Stopped tracking');
                updateStatus();
            } else {
                log('❌ KirtanListeningTracker not loaded');
            }
        }
        
        function addMinute() {
            testMinutes += 1;
            
            // Manually sync
            if (window.UnifiedProgressTracker) {
                window.UnifiedProgressTracker.trackListeningTime(1);
                log('✅ Added 1 minute via UnifiedProgressTracker');
            }
            
            if (window.DashboardAnalytics) {
                window.DashboardAnalytics.updateDailyData('listen', 1);
                log('✅ Synced to DashboardAnalytics');
            }
            
            updateStatus();
        }
        
        function add5Minutes() {
            testMinutes += 5;
            
            // Manually sync
            if (window.UnifiedProgressTracker) {
                window.UnifiedProgressTracker.trackListeningTime(5);
                log('✅ Added 5 minutes via UnifiedProgressTracker');
            }
            
            if (window.DashboardAnalytics) {
                window.DashboardAnalytics.updateDailyData('listen', 5);
                log('✅ Synced to DashboardAnalytics');
            }
            
            updateStatus();
        }
        
        function checkDashboard() {
            const today = new Date().toLocaleDateString('en-CA');
            
            // Check all storage locations
            const analytics = JSON.parse(localStorage.getItem('anhad_daily_analytics') || '{}');
            const userStats = JSON.parse(localStorage.getItem('anhad_user_stats') || '{}');
            const goals = JSON.parse(localStorage.getItem('anhad_daily_goals') || '{}');
            
            log('📊 Dashboard Data:');
            log(`  Analytics: ${analytics[today]?.listenMinutes || 0} min`);
            log(`  UserStats: ${userStats.todayListeningMinutes || 0} min`);
            log(`  Goals: ${goals.listenMinutes?.current || 0} min`);
            
            updateStatus();
        }
        
        function clearData() {
            if (confirm('Clear all listening data?')) {
                const today = new Date().toLocaleDateString('en-CA');
                
                // Clear analytics
                const analytics = JSON.parse(localStorage.getItem('anhad_daily_analytics') || '{}');
                if (analytics[today]) {
                    analytics[today].listenMinutes = 0;
                    localStorage.setItem('anhad_daily_analytics', JSON.stringify(analytics));
                }
                
                // Clear user stats
                const userStats = JSON.parse(localStorage.getItem('anhad_user_stats') || '{}');
                userStats.todayListeningMinutes = 0;
                localStorage.setItem('anhad_user_stats', JSON.stringify(userStats));
                
                // Clear goals
                const goals = JSON.parse(localStorage.getItem('anhad_daily_goals') || '{}');
                if (goals.listenMinutes) {
                    goals.listenMinutes.current = 0;
                    localStorage.setItem('anhad_daily_goals', JSON.stringify(goals));
                }
                
                testMinutes = 0;
                log('🗑️ All data cleared');
                updateStatus();
            }
        }
        
        // Auto-update status every 2 seconds
        setInterval(updateStatus, 2000);
        
        // Initial status
        updateStatus();
        log('🎧 Kirtan Tracking Test Ready');
        log('Click "Start Tracking" to begin, or use "Add X Minutes" to manually test');
    </script>
</body>
</html>
