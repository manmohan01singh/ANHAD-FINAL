<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Sacred Mandana Pattern - Sikh Geometric Design -->
  <defs>
    <radialGradient id="sacredGold" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E8A317" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#D4860A" stop-opacity="0.1"/>
    </radialGradient>
  </defs>
  
  <!-- Outer Circle -->
  <circle cx="200" cy="200" r="180" stroke="url(#sacredGold)" stroke-width="2" fill="none" opacity="0.4"/>
  
  <!-- Inner Circles -->
  <circle cx="200" cy="200" r="150" stroke="url(#sacredGold)" stroke-width="1.5" fill="none" opacity="0.35"/>
  <circle cx="200" cy="200" r="120" stroke="url(#sacredGold)" stroke-width="1.5" fill="none" opacity="0.3"/>
  <circle cx="200" cy="200" r="90" stroke="url(#sacredGold)" stroke-width="1" fill="none" opacity="0.25"/>
  
  <!-- Khanda-inspired Center -->
  <g opacity="0.4">
    <!-- Central Sword -->
    <rect x="195" y="140" width="10" height="120" fill="url(#sacredGold)" rx="2"/>
    <polygon points="200,135 190,145 210,145" fill="url(#sacredGold)"/>
    <polygon points="200,265 190,255 210,255" fill="url(#sacredGold)"/>
    
    <!-- Chakkar (Circle) -->
    <circle cx="200" cy="200" r="35" stroke="url(#sacredGold)" stroke-width="3" fill="none"/>
    
    <!-- Kirpans (Curved Swords) -->
    <path d="M 160 180 Q 150 200 160 220" stroke="url(#sacredGold)" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M 240 180 Q 250 200 240 220" stroke="url(#sacredGold)" stroke-width="4" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Radial Petals (8-fold symmetry) -->
  <g opacity="0.3">
    <ellipse cx="200" cy="80" rx="15" ry="30" fill="url(#sacredGold)"/>
    <ellipse cx="200" cy="320" rx="15" ry="30" fill="url(#sacredGold)"/>
    <ellipse cx="80" cy="200" rx="30" ry="15" fill="url(#sacredGold)"/>
    <ellipse cx="320" cy="200" rx="30" ry="15" fill="url(#sacredGold)"/>
    
    <ellipse cx="130" cy="130" rx="20" ry="25" fill="url(#sacredGold)" transform="rotate(-45 130 130)"/>
    <ellipse cx="270" cy="130" rx="20" ry="25" fill="url(#sacredGold)" transform="rotate(45 270 130)"/>
    <ellipse cx="130" cy="270" rx="20" ry="25" fill="url(#sacredGold)" transform="rotate(45 130 270)"/>
    <ellipse cx="270" cy="270" rx="20" ry="25" fill="url(#sacredGold)" transform="rotate(-45 270 270)"/>
  </g>
  
  <!-- Decorative Dots -->
  <g opacity="0.25">
    <circle cx="200" cy="50" r="4" fill="#D4860A"/>
    <circle cx="200" cy="350" r="4" fill="#D4860A"/>
    <circle cx="50" cy="200" r="4" fill="#D4860A"/>
    <circle cx="350" cy="200" r="4" fill="#D4860A"/>
    <circle cx="100" cy="100" r="3" fill="#D4860A"/>
    <circle cx="300" cy="100" r="3" fill="#D4860A"/>
    <circle cx="100" cy="300" r="3" fill="#D4860A"/>
    <circle cx="300" cy="300" r="3" fill="#D4860A"/>
  </g>
</svg>
