<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ਗੁਰਬਾਣੀ ਕੀਰਤਨ | ANHAD</title>
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
    /* ═══════════════════════════════════════════════════════════════════════════════
       VIRTUAL LIVE KIRTAN — iOS 18+ APPLE MUSIC PREMIUM
       "Feels Like Live" Experience
       ═══════════════════════════════════════════════════════════════════════════════ */

    :root {
        --accent: #C9A227;
        --accent-glow: rgba(201, 162, 39, 0.4);
        --accent-red: #FF3B30;
        
        --bg-primary: #000000;
        --surface-1: rgba(255, 255, 255, 0.06);
        --surface-2: rgba(255, 255, 255, 0.12);
        --surface-3: rgba(255, 255, 255, 0.18);
        
        --text-primary: #FFFFFF;
        --text-secondary: rgba(255, 255, 255, 0.60);
        --text-tertiary: rgba(255, 255, 255, 0.35);
        
        --safe-top: env(safe-area-inset-top, 44px);
        --safe-bottom: env(safe-area-inset-bottom, 34px);
    }

    *, *::before, *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html {
        font-size: 16px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
    }

    body {
        font-family: -apple-system, 'SF Pro Display', 'Inter', BlinkMacSystemFont, sans-serif;
        background: var(--bg-primary);
        color: var(--text-primary);
        min-height: 100vh;
        min-height: 100dvh;
        overflow: hidden;
        position: fixed;
        inset: 0;
        user-select: none;
    }

    /* ═══════════════════════════════════════════════════════════════════════════════
       DYNAMIC BACKGROUND
       ═══════════════════════════════════════════════════════════════════════════════ */
    .bg {
        position: absolute;
        inset: 0;
        z-index: 0;
        overflow: hidden;
    }

    .bg__image {
        position: absolute;
        width: 140%;
        height: 140%;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        object-fit: cover;
        filter: blur(100px) saturate(180%) brightness(0.35);
        animation: bgPulse 8s ease-in-out infinite;
    }

    @keyframes bgPulse {
        0%, 100% { filter: blur(100px) saturate(180%) brightness(0.35); }
        50% { filter: blur(100px) saturate(200%) brightness(0.40); }
    }

    .bg__gradient {
        position: absolute;
        inset: 0;
        background: 
            linear-gradient(180deg, 
                rgba(0,0,0,0.4) 0%, 
                rgba(0,0,0,0.1) 30%,
                rgba(0,0,0,0.1) 60%,
                rgba(0,0,0,0.85) 100%);
    }

    /* ═══════════════════════════════════════════════════════════════════════════════
       PLAYER LAYOUT
       ═══════════════════════════════════════════════════════════════════════════════ */
    .player {
        position: relative;
        z-index: 1;
        width: 100%;
        height: 100%;
        max-width: 428px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        padding: 0 28px;
        padding-top: max(16px, var(--safe-top));
        padding-bottom: max(20px, var(--safe-bottom));
    }

    /* ═══════════════════════════════════════════════════════════════════════════════
       HEADER
       ═══════════════════════════════════════════════════════════════════════════════ */
    .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 8px 0;
        flex-shrink: 0;
    }

    .header__btn {
        width: 36px;
        height: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: transparent;
        border: none;
        color: var(--text-secondary);
        font-size: 22px;
        cursor: pointer;
        border-radius: 50%;
        transition: all 0.15s ease;
        text-decoration: none;
    }

    .header__btn:active {
        transform: scale(0.9);
        opacity: 0.6;
    }

    .header__title {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--text-secondary);
    }

    /* ═══════════════════════════════════════════════════════════════════════════════
       ARTWORK SECTION — DOMINANT
       ═══════════════════════════════════════════════════════════════════════════════ */
    .artwork-section {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px 0;
        min-height: 0;
    }

    .artwork-wrapper {
        position: relative;
        width: 100%;
        max-width: 340px;
        aspect-ratio: 1;
    }

    .artwork {
        width: 100%;
        height: 100%;
        border-radius: 12px;
        overflow: hidden;
        position: relative;
        box-shadow: 
            0 25px 50px rgba(0, 0, 0, 0.5),
            0 10px 20px rgba(0, 0, 0, 0.3),
            0 0 80px var(--accent-glow);
        transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .is-paused .artwork {
        transform: scale(0.82);
        border-radius: 10px;
    }

    .artwork__img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    /* Live Badge on Artwork */
    .artwork__live-badge {
        position: absolute;
        top: 12px;
        left: 12px;
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 6px 12px;
        background: var(--accent-red);
        border-radius: 6px;
        font-size: 11px;
        font-weight: 700;
        color: white;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        box-shadow: 0 4px 12px rgba(255, 59, 48, 0.5);
    }

    .artwork__live-badge::before {
        content: '';
        width: 6px;
        height: 6px;
        background: white;
        border-radius: 50%;
        animation: pulse 1.2s ease-in-out infinite;
    }

    @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
    }

    /* Animated Equalizer on artwork */
    .artwork__equalizer {
        position: absolute;
        bottom: 16px;
        right: 16px;
        display: flex;
        align-items: flex-end;
        gap: 3px;
        height: 24px;
        padding: 6px 10px;
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(10px);
        border-radius: 8px;
    }

    .artwork__eq-bar {
        width: 3px;
        background: var(--accent);
        border-radius: 2px;
        animation: eqDance 0.6s ease-in-out infinite;
    }

    .artwork__eq-bar:nth-child(1) { height: 50%; animation-delay: 0s; }
    .artwork__eq-bar:nth-child(2) { height: 100%; animation-delay: 0.1s; }
    .artwork__eq-bar:nth-child(3) { height: 30%; animation-delay: 0.2s; }
    .artwork__eq-bar:nth-child(4) { height: 70%; animation-delay: 0.15s; }
    .artwork__eq-bar:nth-child(5) { height: 40%; animation-delay: 0.25s; }

    @keyframes eqDance {
        0%, 100% { transform: scaleY(0.4); }
        50% { transform: scaleY(1); }
    }

    .is-paused .artwork__eq-bar {
        animation: none;
        height: 4px !important;
    }

    /* ═══════════════════════════════════════════════════════════════════════════════
       TRACK INFO — SIMPLE FOR LIVE FEEL
       ═══════════════════════════════════════════════════════════════════════════════ */
    .track-info {
        padding: 24px 0;
        flex-shrink: 0;
        text-align: center;
    }

    .track-info__title {
        font-size: 24px;
        font-weight: 700;
        letter-spacing: -0.4px;
        margin-bottom: 6px;
    }

    .track-info__artist {
        font-size: 20px;
        font-weight: 400;
        color: var(--accent);
    }

    /* ═══════════════════════════════════════════════════════════════════════════════
       LIVE BUTTON (Centered)
       ═══════════════════════════════════════════════════════════════════════════════ */
    .live-section {
        display: flex;
        justify-content: center;
        padding: 8px 0 16px;
        flex-shrink: 0;
    }

    .live-btn {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 8px 20px;
        background: var(--accent-red);
        border: none;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 700;
        color: white;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        cursor: pointer;
        transition: all 0.2s ease;
        box-shadow: 0 4px 16px rgba(255, 59, 48, 0.4);
    }

    .live-btn:hover {
        transform: scale(1.05);
        box-shadow: 0 6px 20px rgba(255, 59, 48, 0.5);
    }

    .live-btn:active {
        transform: scale(0.95);
    }

    .live-btn::before {
        content: '';
        width: 8px;
        height: 8px;
        background: white;
        border-radius: 50%;
        animation: pulse 1.2s infinite;
    }

    /* ═══════════════════════════════════════════════════════════════════════════════
       TRANSPORT CONTROLS
       ═══════════════════════════════════════════════════════════════════════════════ */
    .controls {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 48px;
        padding: 16px 0;
        flex-shrink: 0;
    }

    .controls__btn {
        background: transparent;
        border: none;
        color: var(--text-primary);
        cursor: pointer;
        transition: all 0.15s ease;
        padding: 8px;
    }

    .controls__btn:active {
        transform: scale(0.85);
        opacity: 0.6;
    }

    .controls__skip {
        font-size: 32px;
        color: var(--text-secondary);
    }

    .controls__play {
        width: 72px;
        height: 72px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 32px;
        background: var(--text-primary);
        color: var(--bg-primary);
    }

    .controls__play .fa-play {
        margin-left: 4px;
    }

    /* ═══════════════════════════════════════════════════════════════════════════════
       VOLUME SLIDER
       ═══════════════════════════════════════════════════════════════════════════════ */
    .volume {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 0;
        flex-shrink: 0;
    }

    .volume__icon {
        font-size: 12px;
        color: var(--text-tertiary);
        width: 18px;
        text-align: center;
    }

    .volume__track {
        flex: 1;
        position: relative;
        height: 4px;
        background: var(--surface-2);
        border-radius: 2px;
    }

    .volume__fill {
        position: absolute;
        top: 0;
        left: 0;
        height: 100%;
        background: var(--text-primary);
        border-radius: 2px;
        width: 80%;
        pointer-events: none;
    }

    .volume__input {
        position: absolute;
        inset: -10px 0;
        width: 100%;
        height: 24px;
        opacity: 0;
        cursor: pointer;
        margin: 0;
        -webkit-appearance: none;
        appearance: none;
    }

    /* ═══════════════════════════════════════════════════════════════════════════════
       FOOTER
       ═══════════════════════════════════════════════════════════════════════════════ */
    .footer {
        display: flex;
        justify-content: space-around;
        align-items: center;
        padding: 8px 24px;
        flex-shrink: 0;
    }

    .footer__btn {
        width: 44px;
        height: 44px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: transparent;
        border: none;
        color: var(--text-secondary);
        font-size: 20px;
        cursor: pointer;
        border-radius: 50%;
        transition: all 0.15s ease;
    }

    .footer__btn:active {
        transform: scale(0.9);
        opacity: 0.6;
    }

    .footer__btn.active {
        color: var(--accent);
    }

    /* ═══════════════════════════════════════════════════════════════════════════════
       iOS ACTION SHEET (THREE DOTS MENU)
       ═══════════════════════════════════════════════════════════════════════════════ */
    .action-sheet {
        position: fixed;
        inset: 0;
        z-index: 10000;
        display: flex;
        align-items: flex-end;
        justify-content: center;
        background: rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(5px);
        -webkit-backdrop-filter: blur(5px);
        opacity: 0;
        visibility: hidden;
        transition: all 0.3s ease;
    }

    .action-sheet.active {
        opacity: 1;
        visibility: visible;
    }

    .action-sheet__content {
        width: calc(100% - 20px);
        max-width: 400px;
        margin-bottom: 10px;
        transform: translateY(100%);
        transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
    }

    .action-sheet.active .action-sheet__content {
        transform: translateY(0);
    }

    .action-sheet__group {
        background: rgba(45, 45, 48, 0.95);
        backdrop-filter: blur(40px);
        -webkit-backdrop-filter: blur(40px);
        border-radius: 14px;
        overflow: hidden;
        margin-bottom: 8px;
    }

    .action-sheet__header {
        padding: 16px;
        text-align: center;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .action-sheet__title {
        font-size: 13px;
        font-weight: 600;
        color: var(--text-secondary);
        margin-bottom: 4px;
    }

    .action-sheet__subtitle {
        font-size: 12px;
        color: var(--text-tertiary);
    }

    .action-sheet__option {
        display: flex;
        align-items: center;
        gap: 14px;
        width: 100%;
        padding: 18px 20px;
        background: transparent;
        border: none;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        color: #007AFF;
        font-size: 20px;
        font-weight: 400;
        cursor: pointer;
        text-align: left;
        transition: background 0.15s ease;
    }

    .action-sheet__option:last-child {
        border-bottom: none;
    }

    .action-sheet__option:active {
        background: rgba(255, 255, 255, 0.1);
    }

    .action-sheet__option i {
        font-size: 22px;
        width: 28px;
        text-align: center;
    }

    .action-sheet__option--live i {
        color: var(--accent-red);
    }

    .action-sheet__option--curated i {
        color: var(--accent);
    }

    .action-sheet__option--active {
        color: var(--accent) !important;
    }

    .action-sheet__option--active::after {
        content: '✓';
        margin-left: auto;
        font-size: 18px;
    }

    .action-sheet__cancel {
        display: block;
        width: 100%;
        padding: 18px;
        background: rgba(45, 45, 48, 0.98);
        backdrop-filter: blur(40px);
        -webkit-backdrop-filter: blur(40px);
        border: none;
        border-radius: 14px;
        color: #007AFF;
        font-size: 20px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s ease;
    }

    .action-sheet__cancel:active {
        background: rgba(60, 60, 65, 0.98);
    }

    /* ═══════════════════════════════════════════════════════════════════════════════
       STATUS BAR
       ═══════════════════════════════════════════════════════════════════════════════ */
    .status-bar {
        position: absolute;
        bottom: calc(var(--safe-bottom) + 80px);
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 20px;
        background: var(--surface-1);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-radius: 100px;
        font-size: 13px;
        color: var(--text-secondary);
        opacity: 0;
        visibility: hidden;
        transition: all 0.3s ease;
        z-index: 100;
    }

    .status-bar.visible {
        opacity: 1;
        visibility: visible;
    }

    /* ═══════════════════════════════════════════════════════════════════════════════
       RESPONSIVE
       ═══════════════════════════════════════════════════════════════════════════════ */
    @media (max-height: 700px) {
        .artwork-wrapper { max-width: 260px; }
        .track-info { padding: 16px 0; }
        .track-info__title { font-size: 20px; }
        .track-info__artist { font-size: 16px; }
        .controls { gap: 32px; padding: 12px 0; }
        .controls__play { width: 60px; height: 60px; font-size: 26px; }
    }

    @media (max-width: 380px) {
        .player { padding-left: 20px; padding-right: 20px; }
        .artwork-wrapper { max-width: 260px; }
    }
    </style>
</head>

<body>
    <!-- DYNAMIC BACKGROUND -->
    <div class="bg" aria-hidden="true">
        <img class="bg__image" src="../assets/sacred-symbol.png" alt="" id="bgImage">
        <div class="bg__gradient"></div>
    </div>

    <!-- PLAYER -->
    <main class="player is-paused" id="player">
        
        <!-- HEADER -->
        <header class="header">
            <a href="../index.html" class="header__btn" aria-label="Back">
                <i class="fas fa-chevron-down"></i>
            </a>
            <span class="header__title">Amritvela Kirtan</span>
            <button class="header__btn" id="moreBtn" aria-label="More options">
                <i class="fas fa-ellipsis"></i>
            </button>
        </header>

        <!-- ARTWORK -->
        <section class="artwork-section">
            <div class="artwork-wrapper">
                <div class="artwork" id="artwork">
                    <img class="artwork__img" src="../assets/sacred-symbol.png" alt="ੴ" id="artworkImg">
                    <div class="artwork__live-badge">Live</div>
                    <div class="artwork__equalizer" id="equalizer">
                        <div class="artwork__eq-bar"></div>
                        <div class="artwork__eq-bar"></div>
                        <div class="artwork__eq-bar"></div>
                        <div class="artwork__eq-bar"></div>
                        <div class="artwork__eq-bar"></div>
                    </div>
                </div>
            </div>
        </section>

        <!-- TRACK INFO — Simple for live feel -->
        <section class="track-info">
            <h1 class="track-info__title">Live Kirtan</h1>
            <p class="track-info__artist">Divine Gurbani Sangeet</p>
        </section>

        <!-- LIVE BUTTON -->
        <section class="live-section">
            <button class="live-btn" id="liveBtn">Live</button>
        </section>

        <!-- TRANSPORT CONTROLS -->
        <section class="controls">
            <button class="controls__btn controls__skip" id="prevBtn" aria-label="Previous">
                <i class="fas fa-backward-step"></i>
            </button>
            <button class="controls__btn controls__play" id="playBtn" aria-label="Play">
                <i class="fas fa-play" id="playIcon"></i>
            </button>
            <button class="controls__btn controls__skip" id="nextBtn" aria-label="Next">
                <i class="fas fa-forward-step"></i>
            </button>
        </section>

        <!-- VOLUME -->
        <section class="volume">
            <i class="fas fa-volume-off volume__icon"></i>
            <div class="volume__track">
                <div class="volume__fill" id="volumeFill"></div>
                <input type="range" class="volume__input" id="volumeInput" min="0" max="100" value="80">
            </div>
            <i class="fas fa-volume-high volume__icon"></i>
        </section>

        <!-- FOOTER -->
        <section class="footer">
            <button class="footer__btn" id="starBtn" aria-label="Favorite">
                <i class="far fa-star"></i>
            </button>
            <button class="footer__btn" id="airplayBtn" aria-label="AirPlay">
                <i class="fas fa-airplay"></i>
            </button>
            <button class="footer__btn" id="shareBtn" aria-label="Share">
                <i class="fas fa-share"></i>
            </button>
        </section>

        <!-- STATUS BAR -->
        <div class="status-bar" id="statusBar">
            <span id="statusText">Loading...</span>
        </div>
    </main>

    <!-- iOS ACTION SHEET (Switch Radio) -->
    <div class="action-sheet" id="actionSheet">
        <div class="action-sheet__content">
            <div class="action-sheet__group">
                <div class="action-sheet__header">
                    <div class="action-sheet__title">Switch Radio</div>
                    <div class="action-sheet__subtitle">Choose your kirtan experience</div>
                </div>
                <button class="action-sheet__option action-sheet__option--live" onclick="window.location.href='ios17-gurbani-radio.html'">
                    <i class="fas fa-broadcast-tower"></i>
                    Darbar Sahib Live
                </button>
                <button class="action-sheet__option action-sheet__option--curated action-sheet__option--active">
                    <i class="fas fa-music"></i>
                    Amritvela Kirtan
                </button>
            </div>
            <button class="action-sheet__cancel" id="actionCancel">Cancel</button>
        </div>
    </div>

    <!-- AUDIO ELEMENT -->
    <audio id="audio" preload="none" crossorigin="anonymous"></audio>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        // ═══════════════════════════════════════════════════════════════════════════
        // CONFIGURATION — VIRTUAL LIVE (Cloudflare Tracks)
        // ═══════════════════════════════════════════════════════════════════════════
        const AUDIO_CONFIG = {
            baseUrl: (() => {
                const isLocalhost = ['localhost', '127.0.0.1'].includes(window.location.hostname);
                if (isLocalhost && window.location.port !== '3000') {
                    return `${window.location.protocol}//${window.location.hostname}:3000/audio`;
                }
                return '/audio';
            })(),
            totalTracks: 40,
            getTrackUrl(index) {
                return `${this.baseUrl}/day-${index + 1}.webm`;
            }
        };

        // ═══════════════════════════════════════════════════════════════════════════
        // VIRTUAL LIVE MANAGER — Simulates 24/7 broadcast
        // ═══════════════════════════════════════════════════════════════════════════
        class VirtualLive {
            constructor() {
                this.broadcastStart = this.loadBroadcastStart();
                this.defaultDuration = 3600; // 1 hour per track
            }

            loadBroadcastStart() {
                let start = localStorage.getItem('gurbani_broadcast_start');
                if (start) return parseInt(start, 10);
                start = Date.now();
                localStorage.setItem('gurbani_broadcast_start', start.toString());
                return start;
            }

            getCurrentPosition() {
                const elapsed = (Date.now() - this.broadcastStart) / 1000;
                const totalDuration = AUDIO_CONFIG.totalTracks * this.defaultDuration;
                const positionInPlaylist = elapsed % totalDuration;
                
                const trackIndex = Math.floor(positionInPlaylist / this.defaultDuration);
                const trackPosition = positionInPlaylist % this.defaultDuration;
                
                return { trackIndex, trackPosition };
            }
        }

        const virtualLive = new VirtualLive();

        // ═══════════════════════════════════════════════════════════════════════════
        // ELEMENTS
        // ═══════════════════════════════════════════════════════════════════════════
        const player = document.getElementById('player');
        const audio = document.getElementById('audio');
        const playBtn = document.getElementById('playBtn');
        const playIcon = document.getElementById('playIcon');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const liveBtn = document.getElementById('liveBtn');
        const volumeInput = document.getElementById('volumeInput');
        const volumeFill = document.getElementById('volumeFill');
        const starBtn = document.getElementById('starBtn');
        const moreBtn = document.getElementById('moreBtn');
        const actionSheet = document.getElementById('actionSheet');
        const actionCancel = document.getElementById('actionCancel');
        const statusBar = document.getElementById('statusBar');
        const statusText = document.getElementById('statusText');

        let currentTrack = 0;
        let isPlaying = false;

        // ═══════════════════════════════════════════════════════════════════════════
        // FUNCTIONS
        // ═══════════════════════════════════════════════════════════════════════════
        async function goLive() {
            showStatus('Going live...');
            const pos = virtualLive.getCurrentPosition();
            currentTrack = pos.trackIndex;
            audio.src = AUDIO_CONFIG.getTrackUrl(currentTrack);
            
            audio.addEventListener('loadedmetadata', function seekAndPlay() {
                audio.removeEventListener('loadedmetadata', seekAndPlay);
                const duration = audio.duration || 3600;
                audio.currentTime = Math.min(pos.trackPosition, duration - 10);
                audio.play().then(() => {
                    isPlaying = true;
                    updateUI();
                    hideStatus();
                    saveState();
                }).catch(e => showStatus('Tap to play'));
            }, { once: true });
            
            audio.load();
        }

        function play() {
            if (!audio.src) {
                goLive();
                return;
            }
            audio.play().then(() => {
                isPlaying = true;
                updateUI();
                saveState();
            }).catch(e => console.error(e));
        }

        function pause() {
            audio.pause();
            isPlaying = false;
            updateUI();
            saveState();
        }

        function togglePlay() {
            isPlaying ? pause() : play();
        }

        function updateUI() {
            if (isPlaying) {
                playIcon.classList.remove('fa-play');
                playIcon.classList.add('fa-pause');
                player.classList.remove('is-paused');
            } else {
                playIcon.classList.remove('fa-pause');
                playIcon.classList.add('fa-play');
                player.classList.add('is-paused');
            }
        }

        function updateVolume() {
            const val = volumeInput.value;
            audio.volume = val / 100;
            volumeFill.style.width = val + '%';
        }

        function showStatus(msg) {
            statusText.textContent = msg;
            statusBar.classList.add('visible');
        }

        function hideStatus() {
            statusBar.classList.remove('visible');
        }

        function nextTrack() {
            currentTrack = (currentTrack + 1) % AUDIO_CONFIG.totalTracks;
            audio.src = AUDIO_CONFIG.getTrackUrl(currentTrack);
            if (isPlaying) audio.play();
        }

        function prevTrack() {
            if (audio.currentTime > 5) {
                audio.currentTime = 0;
            } else {
                currentTrack = (currentTrack - 1 + AUDIO_CONFIG.totalTracks) % AUDIO_CONFIG.totalTracks;
                audio.src = AUDIO_CONFIG.getTrackUrl(currentTrack);
                if (isPlaying) audio.play();
            }
        }

        function saveState() {
            try {
                localStorage.setItem('anhad_audio_state', JSON.stringify({
                    isPlaying,
                    playerType: 'amritvela',
                    title: 'Live Kirtan',
                    artist: 'Amritvela',
                    timestamp: Date.now()
                }));
                // Also save to persistent audio system
                localStorage.setItem('anhad_persistent_audio', JSON.stringify({
                    shouldPlay: isPlaying,
                    stream: 'amritvela',
                    trackIndex: currentTrack,
                    timestamp: Date.now()
                }));
            } catch(e) {}
        }

        // ═══════════════════════════════════════════════════════════════════════════
        // ACTION SHEET (iOS Popup)
        // ═══════════════════════════════════════════════════════════════════════════
        function openActionSheet() {
            actionSheet.classList.add('active');
        }

        function closeActionSheet() {
            actionSheet.classList.remove('active');
        }

        // ═══════════════════════════════════════════════════════════════════════════
        // EVENT LISTENERS
        // ═══════════════════════════════════════════════════════════════════════════
        playBtn.addEventListener('click', togglePlay);
        prevBtn.addEventListener('click', prevTrack);
        nextBtn.addEventListener('click', nextTrack);
        liveBtn.addEventListener('click', goLive);
        volumeInput.addEventListener('input', updateVolume);

        moreBtn.addEventListener('click', openActionSheet);
        actionCancel.addEventListener('click', closeActionSheet);
        actionSheet.addEventListener('click', (e) => {
            if (e.target === actionSheet) closeActionSheet();
        });

        starBtn.addEventListener('click', () => {
            starBtn.classList.toggle('active');
            const icon = starBtn.querySelector('i');
            icon.classList.toggle('far');
            icon.classList.toggle('fas');
        });

        audio.addEventListener('ended', nextTrack);

        // Keyboard
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
            if (e.key === 'l' || e.key === 'L') goLive();
            if (e.code === 'Escape') closeActionSheet();
        });

        // ═══════════════════════════════════════════════════════════════════════════
        // INITIALIZE — AUTO-PLAY
        // ═══════════════════════════════════════════════════════════════════════════
        updateVolume();
        setTimeout(goLive, 500);

        console.log('🎵 Amritvela Virtual Live — Ready');
    });
    </script>

</body>
</html>
