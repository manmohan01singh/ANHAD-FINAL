<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../css/mobile-lock.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Darbar Sahib Live | ANHAD</title>
    <meta name="description" content="Live Kirtan streaming from Sri Harmandir Sahib — 24/7 Divine Audio.">
    <meta name="theme-color" content="#000000">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
    /* ═══════════════════════════════════════════════════════════════════════════════
       DARBAR SAHIB LIVE — ULTRA PREMIUM PLAYER
       Cinematic Ambient Background • Apple Music-Level Quality
       ═══════════════════════════════════════════════════════════════════════════════ */

    :root {
        --accent: #E8A838;
        --accent-glow: rgba(232, 168, 56, 0.30);
        --accent-soft: rgba(232, 168, 56, 0.12);
        --accent-red: #FF3B30;
        --accent-green: #34C759;
        
        --bg-primary: #000000;
        --surface-1: rgba(255, 255, 255, 0.06);
        --surface-2: rgba(255, 255, 255, 0.10);
        --surface-3: rgba(255, 255, 255, 0.16);
        
        --text-primary: #FFFFFF;
        --text-secondary: rgba(255, 255, 255, 0.60);
        --text-tertiary: rgba(255, 255, 255, 0.35);
        
        --safe-top: env(safe-area-inset-top, 44px);
        --safe-bottom: env(safe-area-inset-bottom, 34px);
    }

    /* ═══ Light Theme ═══ */
    body.light-player {
        --bg-primary: #F2F2F7;
        --surface-1: rgba(0, 0, 0, 0.04);
        --surface-2: rgba(0, 0, 0, 0.06);
        --surface-3: rgba(0, 0, 0, 0.10);
        --text-primary: #1d1d1f;
        --text-secondary: rgba(60, 60, 67, 0.6);
        --text-tertiary: rgba(60, 60, 67, 0.3);
    }

    body.light-player .bg__image {
        filter: blur(40px) saturate(120%) brightness(0.85);
    }

    body.light-player .bg__gradient {
        background: linear-gradient(180deg,
                rgba(242,242,247,0.3) 0%,
                rgba(242,242,247,0.15) 30%,
                rgba(242,242,247,0.65) 80%,
                rgba(242,242,247,0.9) 100%);
    }

    body.light-player .controls__play {
        background: var(--text-primary);
        color: #fff;
    }

    body.light-player .artwork {
        box-shadow: 0 25px 50px rgba(0,0,0,0.2), 0 10px 20px rgba(0,0,0,0.1), 0 0 60px rgba(232,168,56,0.15);
    }

    body.light-player .action-sheet__group {
        background: rgba(255, 255, 255, 0.95);
    }
    body.light-player .action-sheet__cancel {
        background: rgba(255, 255, 255, 0.98);
    }
    body.light-player .action-sheet__option {
        border-bottom-color: rgba(0, 0, 0, 0.06);
    }

    *, *::before, *::after {
        margin: 0; padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html {
        font-size: 16px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
    }

    body {
        font-family: -apple-system, 'SF Pro Display', 'Inter', BlinkMacSystemFont, sans-serif;
        background: var(--bg-primary);
        color: var(--text-primary);
        min-height: 100vh;
        min-height: 100dvh;
        overflow: hidden;
        position: fixed;
        inset: 0;
        user-select: none;
    }

    /* ═══════════════════════════════════════════════════════════════════════════════
       CINEMATIC BACKGROUND — Ultra-Blurred Darbar Sahib Evening
       ═══════════════════════════════════════════════════════════════════════════════ */
    .bg {
        position: absolute;
        inset: 0;
        z-index: 0;
        overflow: hidden;
    }

    .bg__image {
        position: absolute;
        width: 110%;
        height: 110%;
        top: -5%;
        left: -5%;
        object-fit: cover;
        filter: blur(40px) saturate(130%) brightness(0.45);
        animation: bgDrift 25s ease-in-out infinite alternate;
    }

    @keyframes bgDrift {
        0% { transform: scale(1) translate(0, 0); }
        100% { transform: scale(1.05) translate(-1%, -1%); }
    }

    .bg__gradient {
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, 
                rgba(0,0,0,0.3) 0%, 
                rgba(0,0,0,0.1) 30%,
                rgba(0,0,0,0.6) 80%,
                rgba(0,0,0,0.85) 100%);
    }

    /* Floating particles effect */
    .bg__particles {
        position: absolute;
        inset: 0;
        overflow: hidden;
        pointer-events: none;
    }

    .bg__particles::before,
    .bg__particles::after {
        content: '';
        position: absolute;
        border-radius: 50%;
        opacity: 0.04;
        background: var(--accent);
        animation: float 15s ease-in-out infinite;
    }

    .bg__particles::before {
        width: 300px; height: 300px;
        top: 10%; left: -10%;
        animation-delay: 0s;
    }

    .bg__particles::after {
        width: 200px; height: 200px;
        bottom: 20%; right: -5%;
        animation-delay: -7s;
    }

    @keyframes float {
        0%, 100% { transform: translateY(0) translateX(0); }
        33% { transform: translateY(-30px) translateX(20px); }
        66% { transform: translateY(15px) translateX(-15px); }
    }

    /* ═══════════════════════════════════════════════════════════════════════════════
       LAYOUT
       ═══════════════════════════════════════════════════════════════════════════════ */
    .player {
        position: relative;
        z-index: 1;
        width: 100%;
        height: 100%;
        max-width: 430px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        padding: 0 28px;
        padding-top: max(16px, var(--safe-top));
        padding-bottom: max(20px, var(--safe-bottom));
    }

    /* ═══════════════════════════════════════════════════════════════════════════════
       HEADER
       ═══════════════════════════════════════════════════════════════════════════════ */
    .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 8px 0;
        flex-shrink: 0;
    }

    .header__btn {
        width: 36px; height: 36px;
        display: flex; align-items: center; justify-content: center;
        background: transparent;
        border: none;
        color: var(--text-secondary);
        font-size: 22px;
        cursor: pointer;
        border-radius: 50%;
        transition: all 0.15s ease;
    }

    .header__btn:active { transform: scale(0.9); opacity: 0.6; }

    .header__center {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2px;
    }

    .header__title {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1.2px;
        color: var(--text-secondary);
    }

    .header__subtitle {
        font-size: 10px;
        font-weight: 500;
        color: var(--accent);
        letter-spacing: 0.5px;
        opacity: 0.8;
    }

    /* ═══════════════════════════════════════════════════════════════════════════════
       ARTWORK — Cinematic with Ambient Glow
       ═══════════════════════════════════════════════════════════════════════════════ */
    .artwork-section {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px 0;
        min-height: 0;
    }

    .artwork-wrapper {
        position: relative;
        width: 100%;
        max-width: 340px;
        aspect-ratio: 1;
    }

    /* Deep ambient glow beneath artwork */
    .artwork-wrapper::before {
        content: '';
        position: absolute;
        inset: 10% 5%;
        background: radial-gradient(ellipse, var(--accent) 0%, transparent 70%);
        filter: blur(50px);
        opacity: 0.20;
        border-radius: 50%;
        animation: artGlow 8s ease-in-out infinite;
        z-index: -1;
    }

    @keyframes artGlow {
        0%, 100% { opacity: 0.15; transform: scale(0.85); }
        50% { opacity: 0.28; transform: scale(1.08); }
    }

    .artwork {
        width: 100%;
        height: 100%;
        border-radius: 16px;
        overflow: hidden;
        position: relative;
        box-shadow: 
            0 30px 60px rgba(0, 0, 0, 0.55),
            0 12px 24px rgba(0, 0, 0, 0.35),
            0 0 100px var(--accent-glow),
            inset 0 1px 0 rgba(255, 255, 255, 0.06);
        transition: transform 0.7s cubic-bezier(0.34, 1.56, 0.64, 1),
                    box-shadow 0.7s ease,
                    border-radius 0.5s ease;
        animation: artBreathe 8s ease-in-out infinite;
    }

    @keyframes artBreathe {
        0%, 100% { 
            box-shadow: 0 30px 60px rgba(0,0,0,0.55), 0 12px 24px rgba(0,0,0,0.35), 0 0 80px var(--accent-glow); 
        }
        50% { 
            box-shadow: 0 35px 70px rgba(0,0,0,0.6), 0 16px 30px rgba(0,0,0,0.4), 0 0 120px var(--accent-glow); 
        }
    }

    .is-paused .artwork {
        transform: scale(0.78);
        border-radius: 12px;
        animation: none;
        box-shadow: 0 15px 30px rgba(0,0,0,0.4), 0 5px 10px rgba(0,0,0,0.2);
    }

    .artwork__img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.7s ease, filter 0.7s ease;
    }

    .is-paused .artwork__img {
        transform: scale(1.08);
        filter: brightness(0.55) saturate(0.7);
    }

    /* Live Badge */
    .artwork__live-badge {
        position: absolute;
        top: 14px;
        left: 14px;
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 7px 16px;
        background: rgba(255, 59, 48, 0.92);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-radius: 10px;
        font-size: 11px;
        font-weight: 700;
        color: white;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        box-shadow: 0 4px 20px rgba(255, 59, 48, 0.5);
        z-index: 2;
    }

    .artwork__live-badge::before {
        content: '';
        width: 7px; height: 7px;
        background: white;
        border-radius: 50%;
        animation: pulse 1.2s ease-in-out infinite;
    }

    @keyframes pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.3; transform: scale(0.8); }
    }

    /* Animated Equalizer */
    .artwork__equalizer {
        position: absolute;
        bottom: 16px;
        right: 16px;
        display: flex;
        align-items: flex-end;
        gap: 3px;
        height: 30px;
        padding: 8px 14px;
        background: rgba(0, 0, 0, 0.55);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.06);
        z-index: 2;
    }

    .artwork__eq-bar {
        width: 3px;
        background: var(--accent);
        border-radius: 2px;
        animation: eqDance 0.6s ease-in-out infinite;
        transform-origin: bottom;
    }

    .artwork__eq-bar:nth-child(1) { height: 50%; animation-delay: 0s; }
    .artwork__eq-bar:nth-child(2) { height: 100%; animation-delay: 0.1s; }
    .artwork__eq-bar:nth-child(3) { height: 30%; animation-delay: 0.2s; }
    .artwork__eq-bar:nth-child(4) { height: 70%; animation-delay: 0.15s; }
    .artwork__eq-bar:nth-child(5) { height: 50%; animation-delay: 0.25s; }

    @keyframes eqDance {
        0%, 100% { transform: scaleY(0.25); }
        50% { transform: scaleY(1); }
    }

    .is-paused .artwork__eq-bar {
        animation: none;
        height: 3px !important;
        opacity: 0.3;
        transition: all 0.4s ease;
    }

    /* ═══════════════════════════════════════════════════════════════════════════════
       TRACK INFO — Premium Typography
       ═══════════════════════════════════════════════════════════════════════════════ */
    .track-info {
        padding: 20px 0 8px;
        flex-shrink: 0;
    }

    .track-info__row {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 16px;
    }

    .track-info__text {
        flex: 1;
        min-width: 0;
    }

    .track-info__title {
        font-size: 23px;
        font-weight: 700;
        letter-spacing: -0.5px;
        margin-bottom: 5px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        background: linear-gradient(90deg, #fff 20%, var(--accent) 50%, #fff 80%);
        background-size: 200% 100%;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: titleShimmer 5s ease-in-out infinite;
    }

    @keyframes titleShimmer {
        0%, 100% { background-position: 200% center; }
        50% { background-position: -200% center; }
    }

    .is-paused .track-info__title {
        animation: none;
        background: none;
        -webkit-text-fill-color: var(--text-primary);
    }

    .track-info__artist {
        font-size: 20px;
        font-weight: 400;
        color: var(--accent);
        opacity: 0.85;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .track-info__actions {
        display: flex;
        gap: 6px;
        flex-shrink: 0;
        padding-top: 4px;
    }

    .track-info__btn {
        width: 34px; height: 34px;
        border-radius: 50%;
        background: transparent;
        border: none;
        color: var(--text-secondary);
        font-size: 18px;
        cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        transition: all 0.15s ease;
    }

    .track-info__btn:active { transform: scale(0.85); }
    .track-info__btn.active { color: var(--accent); }

    /* ═══════════════════════════════════════════════════════════════════════════════
       TIMELINE — Live Stream Indicator
       ═══════════════════════════════════════════════════════════════════════════════ */
    .timeline {
        padding: 8px 0;
        flex-shrink: 0;
    }

    .timeline__track {
        position: relative;
        height: 4px;
        background: var(--surface-2);
        border-radius: 2px;
        overflow: visible;
    }

    .timeline__progress {
        position: absolute;
        top: 0; left: 0;
        height: 100%;
        background: linear-gradient(90deg, var(--accent), #fff);
        border-radius: 2px;
        width: 100%;
        animation: progressShine 3s ease-in-out infinite;
    }

    @keyframes progressShine {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.7; }
    }

    .is-paused .timeline__progress {
        animation: none;
        background: var(--surface-3);
    }

    .timeline__knob {
        position: absolute;
        top: 50%; right: 0;
        width: 0; height: 0;
        background: white;
        border-radius: 50%;
        transform: translate(50%, -50%);
        transition: all 0.15s ease;
        box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }

    .timeline:hover .timeline__knob,
    .timeline:active .timeline__knob {
        width: 12px; height: 12px;
    }

    .timeline__labels {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 8px;
    }

    .timeline__time {
        font-size: 11px;
        font-weight: 500;
        color: var(--text-tertiary);
        font-variant-numeric: tabular-nums;
    }

    .timeline__live-btn {
        display: flex;
        align-items: center;
        gap: 5px;
        padding: 5px 14px;
        background: var(--accent-red);
        border: none;
        border-radius: 6px;
        font-size: 10px;
        font-weight: 700;
        color: white;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        cursor: pointer;
        transition: all 0.2s ease;
        box-shadow: 0 3px 12px rgba(255, 59, 48, 0.4);
    }

    .timeline__live-btn:hover { transform: scale(1.05); }
    .timeline__live-btn:active { transform: scale(0.95); }

    .timeline__live-btn::before {
        content: '';
        width: 6px; height: 6px;
        background: white;
        border-radius: 50%;
        animation: pulse 1.2s infinite;
    }

    /* ═══════════════════════════════════════════════════════════════════════════════
       TRANSPORT CONTROLS
       ═══════════════════════════════════════════════════════════════════════════════ */
    .controls {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 44px;
        padding: 14px 0;
        flex-shrink: 0;
    }

    .controls__btn {
        background: transparent;
        border: none;
        color: var(--text-primary);
        cursor: pointer;
        transition: all 0.15s ease;
        padding: 8px;
    }

    .controls__btn:active { transform: scale(0.85); opacity: 0.6; }

    .controls__skip {
        font-size: 32px;
        color: var(--text-secondary);
    }

    .controls__play {
        width: 74px; height: 74px;
        border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        font-size: 30px;
        background: var(--text-primary);
        color: var(--bg-primary);
        position: relative;
        transition: all 0.2s ease;
        box-shadow: 0 6px 24px rgba(255, 255, 255, 0.15);
    }

    .controls__play:active {
        transform: scale(0.92);
    }

    .controls__play .fa-play { margin-left: 4px; }

    /* Loading spinner on play button */
    .controls__play.loading {
        pointer-events: none;
    }

    .controls__play.loading .fa-play,
    .controls__play.loading .fa-pause {
        display: none;
    }

    .controls__play.loading::after {
        content: '';
        width: 24px; height: 24px;
        border: 3px solid rgba(0,0,0,0.2);
        border-top-color: var(--bg-primary);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    /* ═══════════════════════════════════════════════════════════════════════════════
       VOLUME
       ═══════════════════════════════════════════════════════════════════════════════ */
    .volume {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 0;
        flex-shrink: 0;
    }

    .volume__icon {
        font-size: 12px;
        color: var(--text-tertiary);
        width: 18px;
        text-align: center;
    }

    .volume__track {
        flex: 1;
        position: relative;
        height: 4px;
        background: var(--surface-2);
        border-radius: 2px;
    }

    .volume__fill {
        position: absolute;
        top: 0; left: 0;
        height: 100%;
        background: var(--text-primary);
        border-radius: 2px;
        width: 70%;
        pointer-events: none;
        transition: width 0.1s ease;
    }

    .volume__input {
        position: absolute;
        inset: -10px 0;
        width: 100%;
        height: 24px;
        opacity: 0;
        cursor: pointer;
        margin: 0;
        -webkit-appearance: none;
        appearance: none;
    }

    /* ═══════════════════════════════════════════════════════════════════════════════
       FOOTER
       ═══════════════════════════════════════════════════════════════════════════════ */
    .footer {
        display: flex;
        justify-content: space-around;
        align-items: center;
        padding: 6px 24px;
        flex-shrink: 0;
    }

    .footer__btn {
        width: 44px; height: 44px;
        display: flex; align-items: center; justify-content: center;
        background: transparent;
        border: none;
        color: var(--text-secondary);
        font-size: 20px;
        cursor: pointer;
        border-radius: 50%;
        transition: all 0.15s ease;
    }

    .footer__btn:active { transform: scale(0.9); opacity: 0.6; }
    .footer__btn.active { color: var(--accent); }

    /* ═══════════════════════════════════════════════════════════════════════════════
       STATUS BAR — Floating Pill
       ═══════════════════════════════════════════════════════════════════════════════ */
    .status-bar {
        position: absolute;
        bottom: calc(var(--safe-bottom) + 80px);
        left: 50%;
        transform: translateX(-50%) translateY(20px);
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 22px;
        background: rgba(30, 30, 34, 0.85);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border-radius: 100px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        font-size: 13px;
        font-weight: 500;
        color: var(--text-secondary);
        opacity: 0;
        visibility: hidden;
        transition: all 0.35s cubic-bezier(0.32, 0.72, 0, 1);
        z-index: 100;
        white-space: nowrap;
    }

    .status-bar.visible {
        opacity: 1;
        visibility: visible;
        transform: translateX(-50%) translateY(0);
    }

    .status-bar__dot {
        width: 6px; height: 6px;
        border-radius: 50%;
        background: var(--accent-green);
        flex-shrink: 0;
    }

    .status-bar.error .status-bar__dot { background: var(--accent-red); }

    /* ═══════════════════════════════════════════════════════════════════════════════
       ACTION SHEET (Switch Radio)
       ═══════════════════════════════════════════════════════════════════════════════ */
    .action-sheet {
        position: fixed;
        inset: 0;
        z-index: 10000;
        display: flex;
        align-items: flex-end;
        justify-content: center;
        background: rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(5px);
        -webkit-backdrop-filter: blur(5px);
        opacity: 0;
        visibility: hidden;
        transition: all 0.3s ease;
    }

    .action-sheet.active { opacity: 1; visibility: visible; }

    .action-sheet__content {
        width: calc(100% - 20px);
        max-width: 400px;
        margin-bottom: 10px;
        transform: translateY(100%);
        transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
    }

    .action-sheet.active .action-sheet__content { transform: translateY(0); }

    .action-sheet__group {
        background: rgba(45, 45, 48, 0.95);
        backdrop-filter: blur(40px);
        -webkit-backdrop-filter: blur(40px);
        border-radius: 14px;
        overflow: hidden;
        margin-bottom: 8px;
    }

    .action-sheet__header {
        padding: 16px;
        text-align: center;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .action-sheet__title { font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 4px; }
    .action-sheet__subtitle { font-size: 12px; color: var(--text-tertiary); }

    .action-sheet__option {
        display: flex; align-items: center; gap: 14px;
        width: 100%; padding: 18px 20px;
        background: transparent; border: none;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        color: #007AFF; font-size: 20px; font-weight: 400;
        cursor: pointer; text-align: left;
        transition: background 0.15s ease;
    }

    .action-sheet__option:last-child { border-bottom: none; }
    .action-sheet__option:active { background: rgba(255, 255, 255, 0.1); }
    .action-sheet__option i { font-size: 22px; width: 28px; text-align: center; }
    .action-sheet__option--live i { color: var(--accent-red); }
    .action-sheet__option--curated i { color: #C9A227; }
    .action-sheet__option--active { color: var(--accent) !important; }
    .action-sheet__option--active::after { content: '✓'; margin-left: auto; font-size: 18px; }

    .action-sheet__cancel {
        display: block; width: 100%; padding: 18px;
        background: rgba(45, 45, 48, 0.98);
        backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
        border: none; border-radius: 14px;
        color: #007AFF; font-size: 20px; font-weight: 600; cursor: pointer;
    }

    .action-sheet__cancel:active { background: rgba(60, 60, 65, 0.98); }

    /* ═══════════════════════════════════════════════════════════════════════════════
       RESPONSIVE
       ═══════════════════════════════════════════════════════════════════════════════ */
    @media (max-height: 700px) {
        .artwork-wrapper { max-width: 260px; }
        .artwork-section { padding: 12px 0; }
        .track-info { padding: 12px 0 4px; }
        .track-info__title { font-size: 20px; }
        .track-info__artist { font-size: 17px; }
        .controls { gap: 32px; padding: 8px 0; }
        .controls__play { width: 62px; height: 62px; font-size: 26px; }
        .volume { padding: 6px 0; }
        .footer { padding: 4px 24px; }
    }

    @media (max-height: 600px) {
        .artwork-wrapper { max-width: 200px; }
        .artwork-section { padding: 6px 0; }
        .track-info { padding: 6px 0 2px; }
        .track-info__title { font-size: 18px; }
        .track-info__artist { font-size: 15px; }
        .controls { gap: 26px; padding: 6px 0; }
        .controls__play { width: 54px; height: 54px; font-size: 22px; }
    }

    @media (max-width: 380px) {
        .player { padding-left: 20px; padding-right: 20px; }
        .artwork-wrapper { max-width: 260px; }
    }

    @media (min-width: 768px) {
        .player { max-width: 500px; }
        .artwork-wrapper { max-width: 380px; }
    }

    @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
            animation: none !important;
            transition-duration: 0.01ms !important;
        }
    }
    </style>
</head>

<body>
    <!-- CINEMATIC BACKGROUND — Beautiful Darbar Sahib Evening -->
    <div class="bg" aria-hidden="true">
        <img class="bg__image" src="../assets/darbar-sahib-evening.webp" alt="" id="bgImage">
        <div class="bg__gradient"></div>
        <div class="bg__particles"></div>
    </div>

    <!-- PLAYER -->
    <main class="player" id="player">
        
        <!-- HEADER -->
        <header class="header">
            <button class="header__btn" id="closeBtn" aria-label="Close">
                <i class="fas fa-chevron-down"></i>
            </button>
            <div class="header__center">
                <span class="header__title">Darbar Sahib Live</span>
                <span class="header__subtitle">Sri Harmandir Sahib Ji</span>
            </div>
            <button class="header__btn" id="themeToggle" aria-label="Toggle Theme">
                <i class="fas fa-sun" id="themeIcon"></i>
            </button>
        </header>

        <!-- ARTWORK -->
        <section class="artwork-section">
            <div class="artwork-wrapper">
                <div class="artwork" id="artwork">
                    <img class="artwork__img" src="../assets/darbar-sahib-evening.webp" alt="Sri Darbar Sahib — Golden Temple" id="artworkImg">
                    <div class="artwork__live-badge">Live</div>
                    <div class="artwork__equalizer" id="equalizer">
                        <div class="artwork__eq-bar"></div>
                        <div class="artwork__eq-bar"></div>
                        <div class="artwork__eq-bar"></div>
                        <div class="artwork__eq-bar"></div>
                        <div class="artwork__eq-bar"></div>
                    </div>
                </div>
            </div>
        </section>

        <!-- TRACK INFO -->
        <section class="track-info">
            <div class="track-info__row">
                <div class="track-info__text">
                    <h1 class="track-info__title">Live Kirtan</h1>
                    <p class="track-info__artist">Sri Harmandir Sahib</p>
                </div>
                <div class="track-info__actions">
                    <button class="track-info__btn" id="starBtn" aria-label="Favorite">
                        <i class="far fa-star"></i>
                    </button>
                    <button class="track-info__btn" id="menuBtn" aria-label="Options">
                        <i class="fas fa-ellipsis"></i>
                    </button>
                </div>
            </div>
        </section>

        <!-- TIMELINE -->
        <section class="timeline">
            <div class="timeline__track">
                <div class="timeline__progress"></div>
                <div class="timeline__knob"></div>
            </div>
            <div class="timeline__labels">
                <span class="timeline__time" id="elapsedTime">--:--</span>
                <button class="timeline__live-btn" id="liveBtn">LIVE</button>
                <span class="timeline__time">∞</span>
            </div>
        </section>

        <!-- TRANSPORT CONTROLS -->
        <section class="controls">
            <button class="controls__btn controls__skip" id="prevBtn" aria-label="Previous">
                <i class="fas fa-backward-step"></i>
            </button>
            <button class="controls__btn controls__play" id="playBtn" aria-label="Play">
                <i class="fas fa-play" id="playIcon"></i>
            </button>
            <button class="controls__btn controls__skip" id="nextBtn" aria-label="Next">
                <i class="fas fa-forward-step"></i>
            </button>
        </section>

        <!-- VOLUME -->
        <section class="volume">
            <i class="fas fa-volume-off volume__icon"></i>
            <div class="volume__track">
                <div class="volume__fill" id="volumeFill"></div>
                <input type="range" class="volume__input" id="volumeInput" min="0" max="100" value="70">
            </div>
            <i class="fas fa-volume-high volume__icon"></i>
        </section>

        <!-- FOOTER -->
        <section class="footer">
            <button class="footer__btn" id="lyricsBtn" aria-label="Lyrics">
                <i class="fas fa-quote-left"></i>
            </button>
            <button class="footer__btn" id="airplayBtn" aria-label="AirPlay">
                <i class="fas fa-airplay"></i>
            </button>
            <button class="footer__btn" id="queueBtn" aria-label="Queue">
                <i class="fas fa-bars-staggered"></i>
            </button>
        </section>

        <!-- STATUS BAR -->
        <div class="status-bar" id="statusBar">
            <span class="status-bar__dot"></span>
            <span id="statusText">Connecting...</span>
        </div>

    </main>

    <!-- AUDIO -->
    <audio id="audio" preload="none" crossorigin="anonymous">
        <source src="https://live.sgpc.net:8443/;nocache=1" type="audio/mpeg">
        <source src="https://live.sgpc.net:8443/;stream.mp3" type="audio/mpeg">
        <source src="http://live.sgpc.net:8000/;stream.mp3" type="audio/mpeg">
    </audio>

    <!-- ACTION SHEET -->
    <div class="action-sheet" id="actionSheet">
        <div class="action-sheet__content">
            <div class="action-sheet__group">
                <div class="action-sheet__header">
                    <div class="action-sheet__title">Switch Radio</div>
                    <div class="action-sheet__subtitle">Choose your kirtan experience</div>
                </div>
                <button class="action-sheet__option action-sheet__option--live action-sheet__option--active">
                    <i class="fas fa-broadcast-tower"></i>
                    Darbar Sahib Live
                </button>
                <button class="action-sheet__option action-sheet__option--curated" onclick="window.location.href='gurbani-radio.html'">
                    <i class="fas fa-music"></i>
                    Amritvela Kirtan
                </button>
            </div>
            <button class="action-sheet__cancel" id="actionCancel">Cancel</button>
        </div>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const player = document.getElementById('player');
        const audio = document.getElementById('audio');
        const playBtn = document.getElementById('playBtn');
        const playIcon = document.getElementById('playIcon');
        const liveBtn = document.getElementById('liveBtn');
        const volumeInput = document.getElementById('volumeInput');
        const volumeFill = document.getElementById('volumeFill');
        const closeBtn = document.getElementById('closeBtn');
        const starBtn = document.getElementById('starBtn');
        const statusBar = document.getElementById('statusBar');
        const statusText = document.getElementById('statusText');
        const elapsedTime = document.getElementById('elapsedTime');

        let isPlaying = false;
        let streamStartTime = null;
        let elapsedInterval = null;
        let isConnecting = false;

        // ━━━ THEME TOGGLE ━━━
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        const savedTheme = localStorage.getItem('kirtan_player_theme') || 'dark';
        if (savedTheme === 'light') {
            document.body.classList.add('light-player');
            if (themeIcon) themeIcon.className = 'fas fa-moon';
        }
        themeToggle?.addEventListener('click', () => {
            const isLight = document.body.classList.toggle('light-player');
            localStorage.setItem('kirtan_player_theme', isLight ? 'light' : 'dark');
            if (themeIcon) themeIcon.className = isLight ? 'fas fa-moon' : 'fas fa-sun';
        });

        // ━━━ PERSIST AUDIO STATE for global mini-player ━━━
        function saveGlobalState(playing) {
            try {
                localStorage.setItem('anhad_global_audio', JSON.stringify({
                    isPlaying: playing,
                    stream: 'darbar',
                    trackIndex: 0,
                    volume: audio.volume,
                    currentTime: 0,
                    timestamp: Date.now()
                }));
            } catch(e) {}
        }
        window.addEventListener('pagehide', () => { if (isPlaying) saveGlobalState(true); });
        window.addEventListener('beforeunload', () => { if (isPlaying) saveGlobalState(true); });

        // BroadcastChannel for mini-player sync
        const bc = new BroadcastChannel('anhad_audio_channel');
        
        function broadcastState() {
            bc.postMessage({
                type: 'state',
                isPlaying,
                streamType: 'darbar-sahib',
                volume: audio.volume,
                timestamp: Date.now()
            });
        }

        // ━━━ PLAY / PAUSE — TRUE LIVE (always reload stream) ━━━
        function play() {
            if (isConnecting) return;
            isConnecting = true;
            playBtn.classList.add('loading');
            showStatus('Connecting to Darbar Sahib...');
            
            audio.load();
            
            const playPromise = audio.play();
            if (playPromise !== undefined) {
                playPromise.then(() => {
                    isConnecting = false;
                    isPlaying = true;
                    streamStartTime = Date.now();
                    playBtn.classList.remove('loading');
                    updateUI();
                    broadcastState();
                    saveGlobalState(true);
                    showStatus('Connected • Streaming Live');
                    setTimeout(hideStatus, 2500);
                    startElapsedTimer();
                }).catch(err => {
                    isConnecting = false;
                    playBtn.classList.remove('loading');
                    console.error('Playback failed:', err);
                    showStatus('Tap ▶ to connect', true);
                    setTimeout(hideStatus, 3000);
                });
            }
        }

        function pause() {
            audio.pause();
            isPlaying = false;
            isConnecting = false;
            playBtn.classList.remove('loading');
            updateUI();
            broadcastState();
            saveGlobalState(false);
            stopElapsedTimer();
        }

        bc.onmessage = (event) => {
            const { type } = event.data;
            if (type === 'toggle') togglePlay();
            else if (type === 'play') play();
            else if (type === 'pause') pause();
            else if (type === 'get_state') broadcastState();
        };

        function togglePlay() { isPlaying ? pause() : play(); }

        function updateUI() {
            if (isPlaying) {
                playIcon.classList.remove('fa-play');
                playIcon.classList.add('fa-pause');
                player.classList.remove('is-paused');
                playBtn.setAttribute('aria-label', 'Pause');
            } else {
                playIcon.classList.remove('fa-pause');
                playIcon.classList.add('fa-play');
                player.classList.add('is-paused');
                playBtn.setAttribute('aria-label', 'Play');
            }
        }

        function jumpToLive() {
            if (!isPlaying) { play(); return; }
            showStatus('Jumping to live...');
            audio.pause();
            audio.load();
            audio.play().then(() => {
                streamStartTime = Date.now();
                showStatus('Now live!');
                setTimeout(hideStatus, 2000);
            }).catch(() => { showStatus('Failed to sync', true); });
        }

        function startElapsedTimer() {
            stopElapsedTimer();
            elapsedInterval = setInterval(() => {
                if (streamStartTime && isPlaying) {
                    const elapsed = Math.floor((Date.now() - streamStartTime) / 1000);
                    const m = Math.floor(elapsed / 60);
                    const s = elapsed % 60;
                    elapsedTime.textContent = `${m}:${s.toString().padStart(2, '0')}`;
                }
            }, 1000);
        }

        function stopElapsedTimer() {
            if (elapsedInterval) { clearInterval(elapsedInterval); elapsedInterval = null; }
        }

        function updateVolume() {
            const val = volumeInput.value;
            audio.volume = val / 100;
            volumeFill.style.width = val + '%';
        }

        function showStatus(msg, isError = false) {
            statusText.textContent = msg;
            statusBar.classList.toggle('error', isError);
            statusBar.classList.add('visible');
        }

        function hideStatus() { statusBar.classList.remove('visible'); }

        function toggleFavorite() {
            starBtn.classList.toggle('active');
            const icon = starBtn.querySelector('i');
            icon.classList.toggle('far');
            icon.classList.toggle('fas');
        }

        const actionSheet = document.getElementById('actionSheet');
        const actionCancel = document.getElementById('actionCancel');
        const moreBtn = document.getElementById('moreBtn');
        function openActionSheet() { actionSheet.classList.add('active'); }
        function closeActionSheet() { actionSheet.classList.remove('active'); }

        // ━━━ EVENT LISTENERS ━━━
        playBtn.addEventListener('click', togglePlay);
        liveBtn.addEventListener('click', jumpToLive);
        volumeInput.addEventListener('input', updateVolume);
        starBtn.addEventListener('click', toggleFavorite);
        closeBtn.addEventListener('click', () => window.location.href = '../index.html');
        moreBtn?.addEventListener('click', openActionSheet);
        actionCancel?.addEventListener('click', closeActionSheet);
        actionSheet?.addEventListener('click', (e) => { if (e.target === actionSheet) closeActionSheet(); });

        audio.addEventListener('playing', () => { isPlaying = true; updateUI(); });
        audio.addEventListener('pause', () => { isPlaying = false; updateUI(); });
        audio.addEventListener('waiting', () => showStatus('Buffering...'));
        audio.addEventListener('canplay', hideStatus);
        audio.addEventListener('error', () => {
            showStatus('Connection error. Tap ▶', true);
            isPlaying = false;
            isConnecting = false;
            playBtn.classList.remove('loading');
            updateUI();
        });

        // Re-sync on tab visible
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden && isPlaying) jumpToLive();
        });

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
            if (e.code === 'ArrowUp') { e.preventDefault(); volumeInput.value = Math.min(100, +volumeInput.value + 5); updateVolume(); }
            if (e.code === 'ArrowDown') { e.preventDefault(); volumeInput.value = Math.max(0, +volumeInput.value - 5); updateVolume(); }
            if (e.key === 'l' || e.key === 'L') jumpToLive();
            if (e.code === 'Escape') closeActionSheet();
        });

        // Init
        updateVolume();
        player.classList.add('is-paused');
        setTimeout(play, 500);

        // Persist state
        function saveState() {
            try {
                localStorage.setItem('anhad_persistent_audio', JSON.stringify({
                    shouldPlay: isPlaying, stream: 'darbar', timestamp: Date.now()
                }));
            } catch (e) {}
        }
        audio.addEventListener('play', saveState);
        audio.addEventListener('pause', saveState);
        window.addEventListener('beforeunload', saveState);

        window.addEventListener('storage', (e) => {
            if (e.key === 'anhad_audio_state') {
                try {
                    const state = JSON.parse(e.newValue || '{}');
                    if (state.playerType === 'darbar-sahib') {
                        if (state.isPlaying && audio.paused) play();
                        else if (!state.isPlaying && !audio.paused) pause();
                    }
                } catch (e) {}
            }
        });

        console.log('🪯 Darbar Sahib Live — Premium Player');
        console.log('💡 Space=Play/Pause, ↑↓=Volume, L=Live');
    });
    </script>
    <script src="../lib/page-lifecycle.js"></script>
</body>
</html>
