<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Darbar Sahib Live | ANHAD</title>
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
    /* ═══════════════════════════════════════════════════════════════════════════════
       DARBAR SAHIB LIVE — ULTRA PREMIUM iOS 18+ MUSIC PLAYER
       Apple Music Quality | 100% Premium Design
       ═══════════════════════════════════════════════════════════════════════════════ */

    :root {
        --accent: #FF9500;
        --accent-red: #FF3B30;
        --accent-green: #34C759;
        
        --bg-primary: #000000;
        --surface-1: rgba(255, 255, 255, 0.06);
        --surface-2: rgba(255, 255, 255, 0.12);
        --surface-3: rgba(255, 255, 255, 0.18);
        
        --text-primary: #FFFFFF;
        --text-secondary: rgba(255, 255, 255, 0.60);
        --text-tertiary: rgba(255, 255, 255, 0.35);
        
        --safe-top: env(safe-area-inset-top, 44px);
        --safe-bottom: env(safe-area-inset-bottom, 34px);
    }

    *, *::before, *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html {
        font-size: 16px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
    }

    body {
        font-family: -apple-system, 'SF Pro Display', 'Inter', BlinkMacSystemFont, sans-serif;
        background: var(--bg-primary);
        color: var(--text-primary);
        min-height: 100vh;
        min-height: 100dvh;
        overflow: hidden;
        position: fixed;
        inset: 0;
        user-select: none;
    }

    /* ═══════════════════════════════════════════════════════════════════════════════
       DYNAMIC BACKGROUND
       ═══════════════════════════════════════════════════════════════════════════════ */
    .bg {
        position: absolute;
        inset: 0;
        z-index: 0;
        overflow: hidden;
    }

    .bg__image {
        position: absolute;
        width: 130%;
        height: 130%;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        object-fit: cover;
        filter: blur(80px) saturate(150%) brightness(0.5);
        transform-origin: center;
    }

    .bg__gradient {
        position: absolute;
        inset: 0;
        background: 
            linear-gradient(180deg, 
                rgba(0,0,0,0.3) 0%, 
                rgba(0,0,0,0.1) 30%,
                rgba(0,0,0,0.2) 60%,
                rgba(0,0,0,0.8) 100%);
    }

    /* ═══════════════════════════════════════════════════════════════════════════════
       PLAYER LAYOUT
       ═══════════════════════════════════════════════════════════════════════════════ */
    .player {
        position: relative;
        z-index: 1;
        width: 100%;
        height: 100%;
        max-width: 428px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        padding: 0 28px;
        padding-top: max(16px, var(--safe-top));
        padding-bottom: max(20px, var(--safe-bottom));
    }

    /* ═══════════════════════════════════════════════════════════════════════════════
       HEADER
       ═══════════════════════════════════════════════════════════════════════════════ */
    .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 8px 0;
        flex-shrink: 0;
    }

    .header__btn {
        width: 36px;
        height: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: transparent;
        border: none;
        color: var(--text-secondary);
        font-size: 22px;
        cursor: pointer;
        border-radius: 50%;
        transition: all 0.15s ease;
    }

    .header__btn:active {
        transform: scale(0.9);
        opacity: 0.6;
    }

    .header__title {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--text-secondary);
    }

    /* ═══════════════════════════════════════════════════════════════════════════════
       ARTWORK SECTION
       ═══════════════════════════════════════════════════════════════════════════════ */
    .artwork-section {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px 0;
        min-height: 0;
    }

    .artwork-wrapper {
        position: relative;
        width: 100%;
        max-width: 340px;
        aspect-ratio: 1;
    }

    .artwork {
        width: 100%;
        height: 100%;
        border-radius: 12px;
        overflow: hidden;
        position: relative;
        box-shadow: 
            0 25px 50px rgba(0, 0, 0, 0.5),
            0 10px 20px rgba(0, 0, 0, 0.3);
        transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .is-paused .artwork {
        transform: scale(0.85);
        border-radius: 8px;
    }

    .artwork__img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    /* Live Badge on Artwork */
    .artwork__live-badge {
        position: absolute;
        top: 12px;
        left: 12px;
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 6px 12px;
        background: var(--accent-red);
        border-radius: 6px;
        font-size: 11px;
        font-weight: 700;
        color: white;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        box-shadow: 0 4px 12px rgba(255, 59, 48, 0.5);
    }

    .artwork__live-badge::before {
        content: '';
        width: 6px;
        height: 6px;
        background: white;
        border-radius: 50%;
        animation: pulse 1.2s ease-in-out infinite;
    }

    @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
    }

    /* ═══════════════════════════════════════════════════════════════════════════════
       TRACK INFO
       ═══════════════════════════════════════════════════════════════════════════════ */
    .track-info {
        padding: 20px 0;
        flex-shrink: 0;
    }

    .track-info__row {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 16px;
    }

    .track-info__text {
        flex: 1;
        min-width: 0;
    }

    .track-info__title {
        font-size: 22px;
        font-weight: 700;
        letter-spacing: -0.4px;
        margin-bottom: 4px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .track-info__artist {
        font-size: 22px;
        font-weight: 400;
        color: var(--text-secondary);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .track-info__actions {
        display: flex;
        gap: 6px;
        flex-shrink: 0;
    }

    .track-info__btn {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: transparent;
        border: none;
        color: var(--text-secondary);
        font-size: 18px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.15s ease;
    }

    .track-info__btn:active {
        transform: scale(0.85);
    }

    .track-info__btn.active {
        color: var(--accent-red);
    }

    /* ═══════════════════════════════════════════════════════════════════════════════
       TIMELINE / SCRUBBER
       ═══════════════════════════════════════════════════════════════════════════════ */
    .timeline {
        padding: 8px 0;
        flex-shrink: 0;
    }

    .timeline__track {
        position: relative;
        height: 4px;
        background: var(--surface-2);
        border-radius: 2px;
        overflow: visible;
    }

    .timeline__progress {
        position: absolute;
        top: 0;
        left: 0;
        height: 100%;
        background: var(--text-primary);
        border-radius: 2px;
        width: 100%;
    }

    .timeline__knob {
        position: absolute;
        top: 50%;
        right: 0;
        width: 0;
        height: 0;
        background: white;
        border-radius: 50%;
        transform: translate(50%, -50%);
        transition: all 0.15s ease;
        box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }

    .timeline:hover .timeline__knob,
    .timeline:active .timeline__knob {
        width: 12px;
        height: 12px;
    }

    .timeline__labels {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 8px;
    }

    .timeline__time {
        font-size: 11px;
        font-weight: 500;
        color: var(--text-tertiary);
        font-variant-numeric: tabular-nums;
    }

    /* LIVE Button */
    .timeline__live-btn {
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 4px 10px;
        background: var(--accent-red);
        border: none;
        border-radius: 4px;
        font-size: 10px;
        font-weight: 700;
        color: white;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        cursor: pointer;
        transition: all 0.2s ease;
        box-shadow: 0 2px 8px rgba(255, 59, 48, 0.4);
    }

    .timeline__live-btn:hover {
        background: #ff5147;
        transform: scale(1.05);
    }

    .timeline__live-btn:active {
        transform: scale(0.95);
    }

    .timeline__live-btn::before {
        content: '';
        width: 5px;
        height: 5px;
        background: white;
        border-radius: 50%;
        animation: pulse 1.2s infinite;
    }

    /* ═══════════════════════════════════════════════════════════════════════════════
       TRANSPORT CONTROLS
       ═══════════════════════════════════════════════════════════════════════════════ */
    .controls {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 20px;
        flex-shrink: 0;
    }

    .controls__btn {
        background: transparent;
        border: none;
        color: var(--text-primary);
        cursor: pointer;
        transition: all 0.15s ease;
        padding: 8px;
    }

    .controls__btn:active {
        transform: scale(0.85);
        opacity: 0.6;
    }

    .controls__skip {
        font-size: 34px;
    }

    .controls__play {
        width: 70px;
        height: 70px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 30px;
    }

    .controls__play .fa-play {
        margin-left: 4px;
    }

    /* ═══════════════════════════════════════════════════════════════════════════════
       VOLUME SLIDER
       ═══════════════════════════════════════════════════════════════════════════════ */
    .volume {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 0;
        flex-shrink: 0;
    }

    .volume__icon {
        font-size: 12px;
        color: var(--text-tertiary);
        width: 18px;
        text-align: center;
    }

    .volume__track {
        flex: 1;
        position: relative;
        height: 4px;
        background: var(--surface-2);
        border-radius: 2px;
    }

    .volume__fill {
        position: absolute;
        top: 0;
        left: 0;
        height: 100%;
        background: var(--text-primary);
        border-radius: 2px;
        width: 70%;
        pointer-events: none;
    }

    .volume__input {
        position: absolute;
        inset: -10px 0;
        width: 100%;
        height: 24px;
        opacity: 0;
        cursor: pointer;
        margin: 0;
        -webkit-appearance: none;
    }

    /* ═══════════════════════════════════════════════════════════════════════════════
       FOOTER
       ═══════════════════════════════════════════════════════════════════════════════ */
    .footer {
        display: flex;
        justify-content: space-around;
        align-items: center;
        padding: 8px 24px;
        flex-shrink: 0;
    }

    .footer__btn {
        width: 44px;
        height: 44px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: transparent;
        border: none;
        color: var(--text-secondary);
        font-size: 20px;
        cursor: pointer;
        border-radius: 50%;
        transition: all 0.15s ease;
    }

    .footer__btn:active {
        transform: scale(0.9);
        opacity: 0.6;
    }

    .footer__btn.active {
        color: var(--text-primary);
    }

    /* ═══════════════════════════════════════════════════════════════════════════════
       CONNECTION STATUS
       ═══════════════════════════════════════════════════════════════════════════════ */
    .status-bar {
        position: absolute;
        bottom: calc(var(--safe-bottom) + 80px);
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 16px;
        background: var(--surface-1);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-radius: 100px;
        font-size: 12px;
        color: var(--text-secondary);
        opacity: 0;
        visibility: hidden;
        transition: all 0.3s ease;
        z-index: 100;
    }

    .status-bar.visible {
        opacity: 1;
        visibility: visible;
    }

    .status-bar__dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--accent-green);
    }

    .status-bar.error .status-bar__dot {
        background: var(--accent-red);
    }

    /* ═══════════════════════════════════════════════════════════════════════════════
       RESPONSIVE
       ═══════════════════════════════════════════════════════════════════════════════ */
    @media (max-height: 700px) {
        .artwork-wrapper {
            max-width: 280px;
        }
        .track-info { padding: 12px 0; }
        .track-info__title,
        .track-info__artist { font-size: 18px; }
        .controls { padding: 8px 16px; }
        .controls__play { width: 60px; height: 60px; font-size: 26px; }
    }

    @media (max-width: 380px) {
        .player { padding-left: 20px; padding-right: 20px; }
        .artwork-wrapper { max-width: 280px; }
        .track-info__title,
        .track-info__artist { font-size: 18px; }
    }

    @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
            animation: none !important;
            transition: none !important;
        }
    }

    /* ═══════════════════════════════════════════════════════════════════════════════
       iOS ACTION SHEET (SWITCH RADIO MENU)
       ═══════════════════════════════════════════════════════════════════════════════ */
    .action-sheet {
        position: fixed;
        inset: 0;
        z-index: 10000;
        display: flex;
        align-items: flex-end;
        justify-content: center;
        background: rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(5px);
        -webkit-backdrop-filter: blur(5px);
        opacity: 0;
        visibility: hidden;
        transition: all 0.3s ease;
    }

    .action-sheet.active {
        opacity: 1;
        visibility: visible;
    }

    .action-sheet__content {
        width: calc(100% - 20px);
        max-width: 400px;
        margin-bottom: 10px;
        transform: translateY(100%);
        transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
    }

    .action-sheet.active .action-sheet__content {
        transform: translateY(0);
    }

    .action-sheet__group {
        background: rgba(45, 45, 48, 0.95);
        backdrop-filter: blur(40px);
        -webkit-backdrop-filter: blur(40px);
        border-radius: 14px;
        overflow: hidden;
        margin-bottom: 8px;
    }

    .action-sheet__header {
        padding: 16px;
        text-align: center;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .action-sheet__title {
        font-size: 13px;
        font-weight: 600;
        color: var(--text-secondary);
        margin-bottom: 4px;
    }

    .action-sheet__subtitle {
        font-size: 12px;
        color: var(--text-tertiary);
    }

    .action-sheet__option {
        display: flex;
        align-items: center;
        gap: 14px;
        width: 100%;
        padding: 18px 20px;
        background: transparent;
        border: none;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        color: #007AFF;
        font-size: 20px;
        font-weight: 400;
        cursor: pointer;
        text-align: left;
        transition: background 0.15s ease;
    }

    .action-sheet__option:last-child {
        border-bottom: none;
    }

    .action-sheet__option:active {
        background: rgba(255, 255, 255, 0.1);
    }

    .action-sheet__option i {
        font-size: 22px;
        width: 28px;
        text-align: center;
    }

    .action-sheet__option--live i {
        color: var(--accent-red);
    }

    .action-sheet__option--curated i {
        color: #C9A227;
    }

    .action-sheet__option--active {
        color: var(--accent-red) !important;
    }

    .action-sheet__option--active::after {
        content: '✓';
        margin-left: auto;
        font-size: 18px;
    }

    .action-sheet__cancel {
        display: block;
        width: 100%;
        padding: 18px;
        background: rgba(45, 45, 48, 0.98);
        backdrop-filter: blur(40px);
        -webkit-backdrop-filter: blur(40px);
        border: none;
        border-radius: 14px;
        color: #007AFF;
        font-size: 20px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s ease;
    }

    .action-sheet__cancel:active {
        background: rgba(60, 60, 65, 0.98);
    }
    </style>
</head>

<body>
    <!-- DYNAMIC BACKGROUND -->
    <div class="bg" aria-hidden="true">
        <img class="bg__image" src="../assets/DARBAR.jpg" alt="" id="bgImage">
        <div class="bg__gradient"></div>
    </div>

    <!-- PLAYER -->
    <main class="player" id="player">
        
        <!-- HEADER -->
        <header class="header">
            <button class="header__btn" id="closeBtn" aria-label="Close">
                <i class="fas fa-chevron-down"></i>
            </button>
            <span class="header__title">Darbar Sahib Live</span>
            <button class="header__btn" id="moreBtn" aria-label="More">
                <i class="fas fa-ellipsis"></i>
            </button>
        </header>

        <!-- ARTWORK -->
        <section class="artwork-section">
            <div class="artwork-wrapper">
                <div class="artwork" id="artwork">
                    <img class="artwork__img" src="../assets/DARBAR.jpg" alt="Sri Harmandir Sahib" id="artworkImg">
                    <div class="artwork__live-badge">Live</div>
                </div>
            </div>
        </section>

        <!-- TRACK INFO -->
        <section class="track-info">
            <div class="track-info__row">
                <div class="track-info__text">
                    <h1 class="track-info__title">Live Kirtan</h1>
                    <p class="track-info__artist">Sri Harmandir Sahib</p>
                </div>
                <div class="track-info__actions">
                    <button class="track-info__btn" id="starBtn" aria-label="Favorite">
                        <i class="far fa-star"></i>
                    </button>
                    <button class="track-info__btn" id="menuBtn" aria-label="Options">
                        <i class="fas fa-ellipsis"></i>
                    </button>
                </div>
            </div>
        </section>

        <!-- TIMELINE -->
        <section class="timeline">
            <div class="timeline__track">
                <div class="timeline__progress"></div>
                <div class="timeline__knob"></div>
            </div>
            <div class="timeline__labels">
                <span class="timeline__time" id="elapsedTime">--:--</span>
                <button class="timeline__live-btn" id="liveBtn">LIVE</button>
                <span class="timeline__time">∞</span>
            </div>
        </section>

        <!-- TRANSPORT CONTROLS -->
        <section class="controls">
            <button class="controls__btn controls__skip" id="prevBtn" aria-label="Previous">
                <i class="fas fa-backward-step"></i>
            </button>
            <button class="controls__btn controls__play" id="playBtn" aria-label="Play">
                <i class="fas fa-play" id="playIcon"></i>
            </button>
            <button class="controls__btn controls__skip" id="nextBtn" aria-label="Next">
                <i class="fas fa-forward-step"></i>
            </button>
        </section>

        <!-- VOLUME -->
        <section class="volume">
            <i class="fas fa-volume-off volume__icon"></i>
            <div class="volume__track">
                <div class="volume__fill" id="volumeFill"></div>
                <input type="range" class="volume__input" id="volumeInput" min="0" max="100" value="70">
            </div>
            <i class="fas fa-volume-high volume__icon"></i>
        </section>

        <!-- FOOTER -->
        <section class="footer">
            <button class="footer__btn" id="lyricsBtn" aria-label="Lyrics">
                <i class="fas fa-quote-left"></i>
            </button>
            <button class="footer__btn" id="airplayBtn" aria-label="AirPlay">
                <i class="fas fa-airplay"></i>
            </button>
            <button class="footer__btn" id="queueBtn" aria-label="Queue">
                <i class="fas fa-bars-staggered"></i>
            </button>
        </section>

        <!-- STATUS BAR -->
        <div class="status-bar" id="statusBar">
            <span class="status-bar__dot"></span>
            <span id="statusText">Connecting...</span>
        </div>

    </main>

    <!-- AUDIO ELEMENT - Multiple Sources for Fallback -->
    <audio id="audio" preload="none" crossorigin="anonymous">
        <!-- Primary: SGPC Live Stream -->
        <source src="https://live.sgpc.net:8443/;nocache=1" type="audio/mpeg">
        <!-- Fallback 1 -->
        <source src="https://live.sgpc.net:8443/;stream.mp3" type="audio/mpeg">
        <!-- Fallback 2 - Alternative URL -->
        <source src="http://live.sgpc.net:8000/;stream.mp3" type="audio/mpeg">
    </audio>

    <!-- iOS ACTION SHEET (Switch Radio) -->
    <div class="action-sheet" id="actionSheet">
        <div class="action-sheet__content">
            <div class="action-sheet__group">
                <div class="action-sheet__header">
                    <div class="action-sheet__title">Switch Radio</div>
                    <div class="action-sheet__subtitle">Choose your kirtan experience</div>
                </div>
                <button class="action-sheet__option action-sheet__option--live action-sheet__option--active">
                    <i class="fas fa-broadcast-tower"></i>
                    Darbar Sahib Live
                </button>
                <button class="action-sheet__option action-sheet__option--curated" onclick="window.location.href='gurbani-radio.html'">
                    <i class="fas fa-music"></i>
                    Amritvela Kirtan
                </button>
            </div>
            <button class="action-sheet__cancel" id="actionCancel">Cancel</button>
        </div>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        // Elements
        const player = document.getElementById('player');
        const audio = document.getElementById('audio');
        const playBtn = document.getElementById('playBtn');
        const playIcon = document.getElementById('playIcon');
        const liveBtn = document.getElementById('liveBtn');
        const volumeInput = document.getElementById('volumeInput');
        const volumeFill = document.getElementById('volumeFill');
        const closeBtn = document.getElementById('closeBtn');
        const starBtn = document.getElementById('starBtn');
        const statusBar = document.getElementById('statusBar');
        const statusText = document.getElementById('statusText');
        const elapsedTime = document.getElementById('elapsedTime');

        let isPlaying = false;
        let streamStartTime = null;
        let elapsedInterval = null;

        // ━━━ BROADCAST CHANNEL FOR MINI-PLAYER SYNC ━━━
        const bc = new BroadcastChannel('anhad_audio_channel');
        
        function broadcastState() {
            bc.postMessage({
                type: 'state',
                isPlaying: isPlaying,
                streamType: 'darbar-sahib',
                currentTime: 0,
                duration: 0,
                volume: audio.volume,
                timestamp: Date.now()
            });
        }

        // ━━━ PLAY / PAUSE ━━━
        function play() {
            showStatus('Connecting to Darbar Sahib...');
            
            // For live streams, we need to reload to get fresh stream
            audio.load();
            
            const playPromise = audio.play();
            if (playPromise !== undefined) {
                playPromise.then(() => {
                    isPlaying = true;
                    streamStartTime = Date.now();
                    updateUI();
                    broadcastState();
                    showStatus('Connected • Streaming Live', false);
                    setTimeout(hideStatus, 2000);
                    startElapsedTimer();
                }).catch(err => {
                    console.error('Playback failed:', err);
                    showStatus('Failed to connect. Tap to retry.', true);
                });
            }
        }

        function pause() {
            audio.pause();
            isPlaying = false;
            updateUI();
            broadcastState();
            stopElapsedTimer();
        }

        // ━━━ LISTEN FOR MINI-PLAYER COMMANDS ━━━
        bc.onmessage = (event) => {
            const { type } = event.data;
            if (type === 'toggle') {
                togglePlay();
            } else if (type === 'play') {
                play();
            } else if (type === 'pause') {
                pause();
            } else if (type === 'get_state') {
                broadcastState();
            }
        };

        function togglePlay() {
            if (isPlaying) {
                pause();
            } else {
                play();
            }
        }

        function updateUI() {
            if (isPlaying) {
                playIcon.classList.remove('fa-play');
                playIcon.classList.add('fa-pause');
                player.classList.remove('is-paused');
                playBtn.setAttribute('aria-label', 'Pause');
            } else {
                playIcon.classList.remove('fa-pause');
                playIcon.classList.add('fa-play');
                player.classList.add('is-paused');
                playBtn.setAttribute('aria-label', 'Play');
            }
        }

        // ━━━ LIVE BUTTON - Jump to Real-Time ━━━
        function jumpToLive() {
            if (!isPlaying) {
                play();
                return;
            }
            
            showStatus('Jumping to live...');
            
            // For a live stream, we reload to get the current live point
            audio.pause();
            audio.load();
            
            audio.play().then(() => {
                streamStartTime = Date.now();
                showStatus('Now live!', false);
                setTimeout(hideStatus, 2000);
            }).catch(err => {
                showStatus('Failed to sync', true);
            });
        }

        // ━━━ ELAPSED TIME ━━━
        function startElapsedTimer() {
            stopElapsedTimer();
            elapsedInterval = setInterval(() => {
                if (streamStartTime && isPlaying) {
                    const elapsed = Math.floor((Date.now() - streamStartTime) / 1000);
                    const mins = Math.floor(elapsed / 60);
                    const secs = elapsed % 60;
                    elapsedTime.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
                }
            }, 1000);
        }

        function stopElapsedTimer() {
            if (elapsedInterval) {
                clearInterval(elapsedInterval);
                elapsedInterval = null;
            }
        }

        // ━━━ VOLUME ━━━
        function updateVolume() {
            const val = volumeInput.value;
            audio.volume = val / 100;
            volumeFill.style.width = val + '%';
        }

        // ━━━ STATUS BAR ━━━
        function showStatus(message, isError = false) {
            statusText.textContent = message;
            statusBar.classList.toggle('error', isError);
            statusBar.classList.add('visible');
        }

        function hideStatus() {
            statusBar.classList.remove('visible');
        }

        // ━━━ FAVORITE ━━━
        function toggleFavorite() {
            starBtn.classList.toggle('active');
            const icon = starBtn.querySelector('i');
            if (starBtn.classList.contains('active')) {
                icon.classList.remove('far');
                icon.classList.add('fas');
            } else {
                icon.classList.remove('fas');
                icon.classList.add('far');
            }
        }

        // ━━━ ACTION SHEET (Switch Radio) ━━━
        const actionSheet = document.getElementById('actionSheet');
        const actionCancel = document.getElementById('actionCancel');
        const moreBtn = document.getElementById('moreBtn');

        function openActionSheet() {
            actionSheet.classList.add('active');
        }

        function closeActionSheet() {
            actionSheet.classList.remove('active');
        }

        // ━━━ EVENT LISTENERS ━━━
        playBtn.addEventListener('click', togglePlay);
        liveBtn.addEventListener('click', jumpToLive);
        volumeInput.addEventListener('input', updateVolume);
        starBtn.addEventListener('click', toggleFavorite);
        closeBtn.addEventListener('click', () => window.location.href = '../index.html');
        
        // Action sheet listeners
        moreBtn?.addEventListener('click', openActionSheet);
        actionCancel?.addEventListener('click', closeActionSheet);
        actionSheet?.addEventListener('click', (e) => {
            if (e.target === actionSheet) closeActionSheet();
        });
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Escape') closeActionSheet();
        });

        // Audio events
        audio.addEventListener('playing', () => {
            isPlaying = true;
            updateUI();
        });

        audio.addEventListener('pause', () => {
            isPlaying = false;
            updateUI();
        });

        audio.addEventListener('waiting', () => {
            showStatus('Buffering...');
        });

        audio.addEventListener('error', (e) => {
            console.error('Audio error:', e);
            showStatus('Connection error. Tap play to retry.', true);
            isPlaying = false;
            updateUI();
        });

        audio.addEventListener('canplay', () => {
            hideStatus();
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                togglePlay();
            }
            if (e.code === 'ArrowUp') {
                e.preventDefault();
                volumeInput.value = Math.min(100, parseInt(volumeInput.value) + 5);
                updateVolume();
            }
            if (e.code === 'ArrowDown') {
                e.preventDefault();
                volumeInput.value = Math.max(0, parseInt(volumeInput.value) - 5);
                updateVolume();
            }
            if (e.key === 'l' || e.key === 'L') {
                jumpToLive();
            }
        });

        // Initialize
        updateVolume();
        player.classList.add('is-paused');

        // ━━━ AUTO-PLAY ON PAGE LOAD ━━━
        // Small delay to ensure page is ready
        setTimeout(() => {
            play();
        }, 500);

        // ━━━ SAVE STATE FOR PERSISTENT AUDIO ━━━
        function savePlaybackState() {
            try {
                localStorage.setItem('anhad_persistent_audio', JSON.stringify({
                    shouldPlay: isPlaying,
                    stream: 'darbar',
                    trackIndex: 0,
                    timestamp: Date.now()
                }));
            } catch (e) {}
        }

        // Update state on play/pause
        audio.addEventListener('play', savePlaybackState);
        audio.addEventListener('pause', savePlaybackState);
        window.addEventListener('beforeunload', savePlaybackState);

        // Check for existing mini-player state on load
        function checkMiniPlayerState() {
            try {
                const stateStr = localStorage.getItem('anhad_audio_state');
                if (stateStr) {
                    const state = JSON.parse(stateStr);
                    // If mini-player was playing, sync with main player
                    if (state.isPlaying && state.playerType === 'darbar-sahib') {
                        // Don't auto-play if user manually paused
                        if (!audio.paused) {
                            isPlaying = true;
                            updateUI();
                        }
                    }
                }
            } catch (e) {}
        }

        // Listen for storage changes from mini-player
        window.addEventListener('storage', (e) => {
            if (e.key === 'anhad_audio_state') {
                try {
                    const state = JSON.parse(e.newValue || '{}');
                    if (state.playerType === 'darbar-sahib') {
                        // Sync play/pause state from mini-player
                        if (state.isPlaying && audio.paused) {
                            play();
                        } else if (!state.isPlaying && !audio.paused) {
                            pause();
                        }
                    }
                } catch (e) {}
            }
        });

        console.log('🪯 ANHAD | Darbar Sahib Live Player');
        console.log('💡 Keyboard: Space=Play/Pause, Arrows=Volume, L=Jump to Live');
        console.log('▶️ Auto-playing on page load...');
    });
    </script>

</body>
</html>
