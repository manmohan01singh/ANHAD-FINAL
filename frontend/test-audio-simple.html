<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Audio Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 40px;
            background: #1a1a1a;
            color: white;
        }
        .test-section {
            background: #2a2a2a;
            padding: 30px;
            margin: 20px 0;
            border-radius: 10px;
        }
        button {
            padding: 15px 30px;
            margin: 10px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background: #4CAF50;
            color: white;
        }
        button:hover {
            background: #45a049;
        }
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            background: #333;
        }
        .playing {
            background: #4CAF50;
        }
        .paused {
            background: #666;
        }
        .log {
            background: #000;
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
            max-height: 300px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
        }
        .log-entry {
            margin: 5px 0;
            padding: 5px;
            border-left: 3px solid #4CAF50;
            padding-left: 10px;
        }
    </style>
</head>
<body>
    <h1>🎵 Simple Audio Coordination Test</h1>
    
    <div class="test-section">
        <h2>Test: Click Both Play Buttons</h2>
        <p>Expected: Only ONE audio should play at a time</p>
        
        <div>
            <button onclick="playDarbar()">🕌 Play Darbar Sahib</button>
            <div class="status" id="darbar-status">Darbar: Not Playing</div>
        </div>
        
        <div>
            <button onclick="playAmritvela()">🌅 Play Amritvela</button>
            <div class="status" id="amritvela-status">Amritvela: Not Playing</div>
        </div>
        
        <div>
            <button onclick="pauseAll()" style="background: #f44336;">⏸️ Pause All</button>
            <button onclick="checkStatus()" style="background: #2196F3;">🔍 Check Status</button>
        </div>
    </div>

    <div class="test-section">
        <h2>📝 Logs</h2>
        <div class="log" id="log"></div>
    </div>

    <!-- Load audio systems -->
    <script src="lib/audio-coordinator.js"></script>
    <script src="lib/persistent-audio.js"></script>
    <script src="lib/global-mini-player.js"></script>

    <script>
        function log(message) {
            const logDiv = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            const time = new Date().toLocaleTimeString();
            entry.textContent = `[${time}] ${message}`;
            logDiv.insertBefore(entry, logDiv.firstChild);
        }

        function updateStatus() {
            // Check what's actually playing
            const anhadPlaying = window.AnhadAudio?.isPlaying();
            const gmpPlaying = window.GlobalMiniPlayer?.isPlaying();
            const coordinator = window.AudioCoordinator?.getCurrentlyPlaying();
            
            // Update Darbar status
            const darbarStatus = document.getElementById('darbar-status');
            if (gmpPlaying && window.GlobalMiniPlayer.getStream() === 'darbar') {
                darbarStatus.textContent = 'Darbar: PLAYING ▶️';
                darbarStatus.className = 'status playing';
            } else {
                darbarStatus.textContent = 'Darbar: Not Playing';
                darbarStatus.className = 'status paused';
            }
            
            // Update Amritvela status
            const amritvelaStatus = document.getElementById('amritvela-status');
            if (anhadPlaying && window.AnhadAudio.getCurrentStream() === 'amritvela') {
                amritvelaStatus.textContent = 'Amritvela: PLAYING ▶️';
                amritvelaStatus.className = 'status playing';
            } else if (gmpPlaying && window.GlobalMiniPlayer.getStream() === 'amritvela') {
                amritvelaStatus.textContent = 'Amritvela: PLAYING ▶️';
                amritvelaStatus.className = 'status playing';
            } else {
                amritvelaStatus.textContent = 'Amritvela: Not Playing';
                amritvelaStatus.className = 'status paused';
            }
            
            log(`Status: AnhadAudio=${anhadPlaying}, GlobalMiniPlayer=${gmpPlaying}, Coordinator=${coordinator}`);
        }

        function playDarbar() {
            log('🕌 User clicked: Play Darbar');
            
            if (window.GlobalMiniPlayer) {
                log('Calling GlobalMiniPlayer.play("darbar")');
                window.GlobalMiniPlayer.play('darbar');
            } else {
                log('❌ GlobalMiniPlayer not available!');
            }
            
            setTimeout(updateStatus, 500);
        }

        function playAmritvela() {
            log('🌅 User clicked: Play Amritvela');
            
            if (window.AnhadAudio) {
                log('Calling AnhadAudio.play("amritvela")');
                window.AnhadAudio.play('amritvela');
            } else {
                log('❌ AnhadAudio not available!');
            }
            
            setTimeout(updateStatus, 500);
        }

        function pauseAll() {
            log('⏸️ Pausing all audio');
            
            if (window.AudioCoordinator) {
                window.AudioCoordinator.pauseAll();
            }
            
            setTimeout(updateStatus, 200);
        }

        function checkStatus() {
            log('🔍 Checking status...');
            
            if (!window.AudioCoordinator) {
                log('❌ AudioCoordinator NOT LOADED!');
                return;
            }
            
            const registered = window.AudioCoordinator.getRegisteredPlayers();
            const current = window.AudioCoordinator.getCurrentlyPlaying();
            
            log(`Registered players: ${registered.join(', ')}`);
            log(`Currently playing: ${current || 'None'}`);
            
            // Check actual audio elements
            const audios = document.querySelectorAll('audio');
            log(`Found ${audios.length} audio elements in DOM`);
            
            audios.forEach((audio, i) => {
                if (!audio.paused) {
                    log(`⚠️ Audio ${i+1} is PLAYING: ${audio.src}`);
                }
            });
            
            updateStatus();
        }

        // Auto-update status every second
        setInterval(updateStatus, 1000);

        // Initial check
        setTimeout(() => {
            log('🎵 Test page loaded');
            checkStatus();
        }, 1000);

        // Listen for audio events
        document.addEventListener('play', (e) => {
            if (e.target.tagName === 'AUDIO') {
                log(`🔊 AUDIO PLAY EVENT: ${e.target.src}`);
            }
        }, true);

        document.addEventListener('pause', (e) => {
            if (e.target.tagName === 'AUDIO') {
                log(`⏸️ AUDIO PAUSE EVENT: ${e.target.src}`);
            }
        }, true);
    </script>
</body>
</html>
