<!DOCTYPE html>
<html lang="en" data-global-theme="force">
<head>
  <!-- CRITICAL: Theme blocker - MUST run before paint -->
  <script>
(function() {
  try {
    const theme = localStorage.getItem('anhad_theme') || 'light';
    const html = document.documentElement;
    if (theme === 'dark') {
      html.classList.add('dark', 'dark-mode');
      html.setAttribute('data-theme', 'dark');
      html.style.colorScheme = 'dark';
    } else {
      html.classList.remove('dark', 'dark-mode');
      html.setAttribute('data-theme', 'light');
      html.style.colorScheme = 'light';
    }
  } catch (e) {}
})();
  </script>
  <meta name="color-scheme" content="light dark">
    <link rel="stylesheet" href="../css/mobile-lock.css">
  <link rel="stylesheet" href="../css/anhad-core.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <meta name="apple-mobile-web-app-capable" content="yes">
  
  <title>Favorites • ANHAD</title>
  
  <!-- Global Theme -->
  <script src="../lib/global-theme.js"></script>
  <script src="../lib/page-lifecycle.js"></script>
  <script src="../lib/audio-preload.js"></script>
  <script src="../lib/audio-coordinator.js"></script>
  <script src="../lib/smooth-navigation.js"></script>
  <script src="../lib/global-mini-player.js" defer></script>
  <script src="../js/anhad-core.js" defer></script>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+Gurmukhi:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../css/claymorphism-system.css?v=1">
  
  <style>
    :root {
      --bg-primary: #FAF8F5;
      --bg-white: #FFFFFF;
      --bg-soft: #F5F2EE;
      --gold-400: #D4A03A;
      --gold-500: #B8860B;
      --gold-gradient: linear-gradient(135deg, #D4A03A 0%, #B8860B 100%);
      --text-primary: #1A1D26;
      --text-secondary: #5A5F72;
      --text-tertiary: #9CA3B8;
      --glass-white: rgba(255, 255, 255, 0.75);
      --glass-border: rgba(255, 255, 255, 0.5);
      --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.06);
      --shadow-lg: 0 8px 30px rgba(0, 0, 0, 0.08);
      --radius-md: 14px;
      --radius-lg: 20px;
      --radius-xl: 28px;
      --safe-top: env(safe-area-inset-top, 20px);
      --safe-bottom: env(safe-area-inset-bottom, 34px);
    }
    
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      padding-bottom: calc(100px + var(--safe-bottom));
      -webkit-font-smoothing: antialiased;
    }
    
    .app {
      max-width: 430px;
      margin: 0 auto;
      padding: 0 20px;
      padding-top: calc(var(--safe-top) + 16px);
      width: 100%;
      overflow-x: hidden;
    }
    
    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    
    .header__back {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(145deg, #F0F8FF 0%, #E8F4FF 50%, #E0F0FF 100%);
      color: var(--text-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      text-decoration: none;
      box-shadow:
        15px 15px 40px rgba(0, 0, 0, 0.35),
        8px 8px 20px rgba(0, 0, 0, 0.2),
        -10px -10px 30px rgba(255, 255, 255, 0.95),
        0 0 0 3px rgba(255, 255, 255, 0.6),
        inset 0 2px 4px rgba(255, 255, 255, 1),
        inset 0 -2px 4px rgba(0, 122, 255, 0.15);
      border: 2px solid rgba(255, 255, 255, 0.6);
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    
    .header__back:active {
      transform: scale(0.94);
      box-shadow:
        inset 10px 10px 30px rgba(0, 0, 0, 0.3),
        inset -6px -6px 20px rgba(255, 255, 255, 0.6),
        0 0 0 2px rgba(255, 255, 255, 0.4),
        inset 0 -2px 4px rgba(0, 122, 255, 0.2);
    }
    
    .header__title {
      font-size: 20px;
      font-weight: 700;
    }
    
    .header__btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(145deg, #F0F8FF 0%, #E8F4FF 50%, #E0F0FF 100%);
      color: var(--text-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow:
        15px 15px 40px rgba(0, 0, 0, 0.35),
        8px 8px 20px rgba(0, 0, 0, 0.2),
        -10px -10px 30px rgba(255, 255, 255, 0.95),
        0 0 0 3px rgba(255, 255, 255, 0.6),
        inset 0 2px 4px rgba(255, 255, 255, 1),
        inset 0 -2px 4px rgba(0, 122, 255, 0.15);
      border: 2px solid rgba(255, 255, 255, 0.6);
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    
    .header__btn:active {
      transform: scale(0.94);
      box-shadow:
        inset 10px 10px 30px rgba(0, 0, 0, 0.3),
        inset -6px -6px 20px rgba(255, 255, 255, 0.6),
        0 0 0 2px rgba(255, 255, 255, 0.4),
        inset 0 -2px 4px rgba(0, 122, 255, 0.2);
    }
    
    /* Tabs */
    .tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 20px;
      background: linear-gradient(145deg, #F5F5F7 0%, #E8E8EC 100%);
      padding: 5px;
      border-radius: 20px;
      box-shadow:
        15px 15px 40px rgba(0, 0, 0, 0.15),
        8px 8px 20px rgba(0, 0, 0, 0.08),
        -8px -8px 25px rgba(255, 255, 255, 0.9),
        0 0 0 2px rgba(255, 255, 255, 0.5),
        inset 0 1px 2px rgba(255, 255, 255, 0.9),
        inset 0 -1px 2px rgba(0, 0, 0, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.4);
    }
    
    .tab {
      flex: 1;
      min-width: 0;
      padding: 8px 10px;
      border: none;
      border-radius: 16px;
      background: transparent;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      white-space: nowrap;
      overflow: hidden;
    }
    
    .tab i {
      font-size: 12px;
      flex-shrink: 0;
    }
    
    .tab--active {
      background: linear-gradient(145deg, #F0F8FF 0%, #E8F4FF 50%, #E0F0FF 100%);
      color: #007AFF;
      box-shadow:
        8px 8px 25px rgba(0, 122, 255, 0.25),
        4px 4px 12px rgba(0, 0, 0, 0.15),
        -4px -4px 15px rgba(255, 255, 255, 0.9),
        0 0 0 2px rgba(255, 255, 255, 0.6),
        inset 0 2px 4px rgba(255, 255, 255, 1),
        inset 0 -2px 4px rgba(0, 122, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.5);
    }
    
    .tab__count {
      background: linear-gradient(145deg, rgba(255,255,255,0.9), rgba(240,240,245,0.9));
      padding: 2px 6px;
      border-radius: 100px;
      font-size: 11px;
      font-weight: 700;
      color: var(--text-tertiary);
      flex-shrink: 0;
      box-shadow:
        2px 2px 6px rgba(0, 0, 0, 0.1),
        -1px -1px 4px rgba(255, 255, 255, 0.8),
        inset 0 1px 1px rgba(255, 255, 255, 0.9);
    }
    
    .tab--active .tab__count {
      background: linear-gradient(145deg, rgba(0, 122, 255, 0.12), rgba(0, 122, 255, 0.08));
      color: #007AFF;
      box-shadow:
        2px 2px 6px rgba(0, 122, 255, 0.15),
        -1px -1px 4px rgba(255, 255, 255, 0.8),
        inset 0 1px 1px rgba(255, 255, 255, 0.9);
    }
    
    /* Hide count badge on very narrow screens */
    @media (max-width: 360px) {
      .tab {
        padding: 8px 6px;
        font-size: 12px;
        gap: 4px;
      }
      .tab__count {
        display: none;
      }
    }
    
    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 60px 24px;
      background: var(--bg-primary);
      border-radius: 28px;
    }
    
    .empty-state__icon {
      font-size: 64px;
      margin-bottom: 20px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: linear-gradient(145deg, #F0F8FF 0%, #E8F4FF 100%);
      box-shadow:
        15px 15px 40px rgba(0, 122, 255, 0.15),
        8px 8px 20px rgba(0, 0, 0, 0.08),
        -8px -8px 25px rgba(255, 255, 255, 0.9),
        0 0 0 2px rgba(255, 255, 255, 0.6),
        inset 0 2px 4px rgba(255, 255, 255, 1),
        inset 0 -2px 4px rgba(0, 122, 255, 0.1);
      border: 2px solid rgba(255, 255, 255, 0.5);
    }
    
    .empty-state__title {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    
    .empty-state__desc {
      font-size: 14px;
      color: var(--text-tertiary);
    }
    
    /* Favorite Cards */
    .favorites-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    
    .fav-card {
      background: linear-gradient(145deg, #FFFFFF 0%, #F8F8FA 100%);
      border-radius: 24px;
      padding: 20px;
      box-shadow:
        inset 0 2px 4px rgba(255, 255, 255, 1),
        inset 0 -2px 4px rgba(0, 0, 0, 0.04);
      border: 1px solid rgba(0, 0, 0, 0.06);
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .fav-card:hover {
      border-color: rgba(0, 122, 255, 0.2);
      box-shadow:
        inset 0 2px 4px rgba(255, 255, 255, 1),
        inset 0 -2px 6px rgba(0, 122, 255, 0.06);
    }
    
    .fav-card:active {
      transform: scale(0.98);
      box-shadow:
        inset 0 2px 6px rgba(0, 0, 0, 0.08);
    }
    
    .fav-card__header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }
    
    .fav-card__type {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 6px 12px;
      border-radius: 100px;
      background: linear-gradient(145deg, #F0F8FF 0%, #E8F4FF 100%);
      color: #007AFF;
      box-shadow:
        4px 4px 12px rgba(0, 122, 255, 0.15),
        -2px -2px 8px rgba(255, 255, 255, 0.8),
        inset 0 1px 2px rgba(255, 255, 255, 0.9),
        0 0 0 1px rgba(255, 255, 255, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.4);
    }
    
    .fav-card__actions {
      display: flex;
      gap: 8px;
    }
    
    .fav-card__action {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(145deg, #FFFFFF 0%, #F5F5F7 100%);
      color: var(--text-tertiary);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow:
        4px 4px 12px rgba(0, 0, 0, 0.15),
        -2px -2px 8px rgba(255, 255, 255, 0.8),
        inset 0 1px 2px rgba(255, 255, 255, 0.9),
        0 0 0 1px rgba(255, 255, 255, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.4);
    }
    
    .fav-card__action:hover {
      background: linear-gradient(145deg, #F0F8FF 0%, #E8F4FF 100%);
      color: #007AFF;
      box-shadow:
        4px 4px 12px rgba(0, 122, 255, 0.2),
        -2px -2px 8px rgba(255, 255, 255, 0.9),
        inset 0 1px 2px rgba(255, 255, 255, 0.9);
    }
    
    .fav-card__action:active {
      transform: scale(0.92);
      box-shadow:
        inset 3px 3px 8px rgba(0, 0, 0, 0.15),
        inset -2px -2px 6px rgba(255, 255, 255, 0.8);
    }
    
    .fav-card__action--delete:hover {
      background: linear-gradient(145deg, #FFF0F0 0%, #FFE8E8 100%);
      color: #FF3B30;
      box-shadow:
        4px 4px 12px rgba(255, 59, 48, 0.2),
        -2px -2px 8px rgba(255, 255, 255, 0.9),
        inset 0 1px 2px rgba(255, 255, 255, 0.9);
    }
    
    .fav-card__gurmukhi {
      font-family: 'Noto Sans Gurmukhi', serif;
      font-size: 22px;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.5;
      margin-bottom: 8px;
    }
    
    .fav-card__translation {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.5;
      margin-bottom: 12px;
    }
    
    .fav-card__meta {
      display: flex;
      gap: 16px;
      font-size: 12px;
      color: var(--text-tertiary);
      margin-bottom: 12px;
    }
    
    .fav-card__read-btn {
      width: 100%;
      padding: 14px 18px;
      border: none;
      border-radius: 16px;
      background: linear-gradient(145deg, #F0F8FF 0%, #E8F4FF 50%, #E0F0FF 100%);
      color: #007AFF;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow:
        8px 8px 25px rgba(0, 122, 255, 0.2),
        4px 4px 12px rgba(0, 0, 0, 0.1),
        -4px -4px 15px rgba(255, 255, 255, 0.9),
        0 0 0 2px rgba(255, 255, 255, 0.6),
        inset 0 2px 4px rgba(255, 255, 255, 1),
        inset 0 -2px 4px rgba(0, 122, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.5);
    }
    
    .fav-card__read-btn:hover {
      transform: translateY(-2px);
      box-shadow:
        12px 12px 35px rgba(0, 122, 255, 0.25),
        6px 6px 18px rgba(0, 0, 0, 0.12),
        -6px -6px 20px rgba(255, 255, 255, 0.95),
        0 0 0 2px rgba(255, 255, 255, 0.7),
        inset 0 2px 4px rgba(255, 255, 255, 1);
    }
    
    .fav-card__read-btn:active {
      transform: scale(0.98) translateY(1px);
      box-shadow:
        inset 6px 6px 18px rgba(0, 0, 0, 0.15),
        inset -4px -4px 12px rgba(255, 255, 255, 0.8),
        0 0 0 2px rgba(255, 255, 255, 0.5);
    }
    
    /* Add Note Button */
    .add-note-btn {
      position: fixed;
      bottom: calc(100px + var(--safe-bottom));
      right: 20px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(145deg, #F0F8FF 0%, #E8F4FF 50%, #E0F0FF 100%);
      color: #007AFF;
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 100;
      box-shadow:
        12px 12px 40px rgba(0, 122, 255, 0.3),
        6px 6px 20px rgba(0, 0, 0, 0.15),
        -6px -6px 20px rgba(255, 255, 255, 0.9),
        0 0 0 3px rgba(255, 255, 255, 0.6),
        inset 0 2px 4px rgba(255, 255, 255, 1),
        inset 0 -2px 4px rgba(0, 122, 255, 0.15);
      border: 2px solid rgba(255, 255, 255, 0.6);
    }
    
    .add-note-btn:hover {
      transform: scale(1.05);
      box-shadow:
        16px 16px 50px rgba(0, 122, 255, 0.35),
        8px 8px 25px rgba(0, 0, 0, 0.18),
        -8px -8px 25px rgba(255, 255, 255, 0.95),
        0 0 0 3px rgba(255, 255, 255, 0.7);
    }
    
    .add-note-btn:active {
      transform: scale(0.95);
      box-shadow:
        inset 8px 8px 25px rgba(0, 0, 0, 0.2),
        inset -4px -4px 15px rgba(255, 255, 255, 0.8),
        0 0 0 3px rgba(255, 255, 255, 0.5);
    }
    
    .add-note-btn.hidden {
      display: none;
    }
    
    .fav-card__meta-item {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    
    /* Section Divider */
    .section-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0 16px;
    }
    
    .section-divider__line {
      flex: 1;
      height: 1px;
      background: var(--bg-soft);
    }
    
    .section-divider__text {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    /* Old bottom-nav styles removed — unified emoji navbar CSS is below */
    
    /* Animations */
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .app > *, .favorites-list > * {
      animation: slideUp 0.5s ease backwards;
    }
    
    .favorites-list > *:nth-child(1) { animation-delay: 0.05s; }
    .favorites-list > *:nth-child(2) { animation-delay: 0.1s; }
    .favorites-list > *:nth-child(3) { animation-delay: 0.15s; }
    .favorites-list > *:nth-child(4) { animation-delay: 0.2s; }
    .favorites-list > *:nth-child(5) { animation-delay: 0.25s; }
    
    /* Tab Content */
    .tab-content {
      display: none;
    }
    
    .tab-content--active {
      display: block;
    }
    /* ═══ Favorites Dark Mode ═══ */
    html.dark-mode body { background: #0D0D0F !important; color: #F5F5F7; }
    
    /* Header buttons dark mode - subtle charcoal */
    html.dark-mode .header__back, html.dark-mode .header__btn {
      background: linear-gradient(145deg, #2C2C2E 0%, #1C1C1E 100%) !important;
      color: #F5F5F7;
      box-shadow:
        4px 4px 12px rgba(0, 0, 0, 0.4),
        2px 2px 6px rgba(0, 0, 0, 0.25),
        -2px -2px 8px rgba(255, 255, 255, 0.02),
        0 0 0 1px rgba(255, 255, 255, 0.06),
        inset 0 1px 1px rgba(255, 255, 255, 0.04),
        inset 0 -1px 2px rgba(0, 0, 0, 0.3) !important;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    
    html.dark-mode .header__back:active, html.dark-mode .header__btn:active {
      box-shadow:
        inset 3px 3px 10px rgba(0, 0, 0, 0.4),
        inset -2px -2px 6px rgba(255, 255, 255, 0.03),
        0 0 0 1px rgba(255, 255, 255, 0.05) !important;
    }
    
    html.dark-mode .header__title { color: #F5F5F7 !important; }
    
    /* Tabs dark mode - darker subtle */
    html.dark-mode .tabs { 
      background: linear-gradient(145deg, #1C1C1E 0%, #252528 100%) !important;
      box-shadow:
        4px 4px 12px rgba(0, 0, 0, 0.4),
        2px 2px 6px rgba(0, 0, 0, 0.25),
        -2px -2px 8px rgba(255, 255, 255, 0.02),
        0 0 0 1px rgba(255, 255, 255, 0.05),
        inset 0 1px 1px rgba(255, 255, 255, 0.03),
        inset 0 -1px 2px rgba(0, 0, 0, 0.2) !important;
      border: 1px solid rgba(255, 255, 255, 0.04);
    }
    
    html.dark-mode .tab { color: rgba(255, 255, 255, 0.4); }
    
    html.dark-mode .tab--active { 
      background: linear-gradient(145deg, #2C2C2E 0%, #36363A 100%) !important;
      color: #F5F5F7 !important;
      box-shadow:
        2px 2px 8px rgba(0, 0, 0, 0.3),
        1px 1px 4px rgba(0, 0, 0, 0.2),
        -1px -1px 6px rgba(255, 255, 255, 0.03),
        0 0 0 1px rgba(255, 255, 255, 0.06),
        inset 0 1px 2px rgba(255, 255, 255, 0.04),
        inset 0 -1px 2px rgba(0, 0, 0, 0.2) !important;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }
    
    html.dark-mode .tab__count { 
      background: linear-gradient(145deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
      color: rgba(255, 255, 255, 0.35);
      box-shadow:
        1px 1px 3px rgba(0, 0, 0, 0.3),
        -1px -1px 2px rgba(255, 255, 255, 0.02),
        inset 0 1px 1px rgba(255, 255, 255, 0.03);
    }
    
    html.dark-mode .tab--active .tab__count { 
      background: linear-gradient(145deg, rgba(255,255,255,0.08), rgba(255,255,255,0.04));
      color: rgba(255, 255, 255, 0.6);
      box-shadow:
        1px 1px 3px rgba(0, 0, 0, 0.25),
        -1px -1px 2px rgba(255, 255, 255, 0.03),
        inset 0 1px 1px rgba(255, 255, 255, 0.04);
    }
    
    /* Cards dark mode - clean inset only */
    html.dark-mode .fav-card {

    html.dark-mode .fav-card__type {

    /* Action buttons dark mode */

      background: linear-gradient(145deg, #2C2C2E 0%, #36363A 100%);

        0 6px 32px rgba(0, 0, 0, 0.40),

<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <a href="../index.html" class="header__back glass-nav__back" aria-label="Back">
        <i class="fas fa-chevron-left"></i>
      </a>
      <h1 class="header__title">Favorites</h1>
      <button class="header__btn" onclick="AnhadTheme.toggle()">
        <i class="fas fa-sun" id="themeIcon"></i>
      </button>
    </header>
    
    <!-- Tabs -->
    <div class="tabs">
      <button class="tab tab--active" data-tab="shabads">
        <i class="fas fa-bookmark"></i>
        Shabads
        <span class="tab__count" id="shabadCount">0</span>
      </button>
      <button class="tab" data-tab="bookmarks">

        <span class="tab__count" id="bookmarkCount">0</span>

        <i class="fas fa-sticky-note"></i>
        Notes
        <span class="tab__count" id="noteCount">0</span>
      </button>
    </div>
    
    <!-- Shabads Tab -->
    <div class="tab-content tab-content--active" id="shabadsTab">
      <div class="favorites-list" id="shabadsList">
        <!-- Will be populated by JS -->
      </div>
    </div>
    
    <!-- Bookmarks Tab -->
    <div class="tab-content" id="bookmarksTab">
      <div class="favorites-list" id="bookmarksList">
        <!-- Will be populated by JS -->
      </div>
    </div>
    
    <!-- Notes Tab -->
    <div class="tab-content" id="notesTab">
      <div class="favorites-list" id="notesList">
        <!-- Will be populated by JS -->
      </div>
    </div>
    
    <!-- Add Note Floating Button (only visible on Notes tab) -->
    <button class="add-note-btn hidden" id="addNoteBtn" onclick="showAddNoteModal()">
      <i class="fas fa-plus"></i>
    </button>
  </div>
  
  <!-- Bottom Navigation — Unified Emoji Navbar -->
  <nav class="bottom-nav" aria-label="Main Navigation">
    <div class="bottom-nav__glass">
      <a href="../index.html" class="nav-tab" aria-label="Home" data-index="0">

        <span class="nav-tab__label">Home</span>
      </a>
      <a href="../Insights/insights.html" class="nav-tab" aria-label="Learning" data-index="1">
        <span class="ios-emoji ios-emoji--nav" role="img" aria-label="learning">📚</span>
        <span class="nav-tab__label">Learning</span>
      </a>
      <button class="nav-tab nav-tab--active" aria-label="Favorites" aria-current="page" data-index="2">
        <span class="ios-emoji ios-emoji--nav" role="img" aria-label="favorites">❤️</span>
        <span class="nav-tab__label">Favorites</span>
      </button>

      </a>

  <!-- Scripts -->
  <script src="../lib/share-card.js"></script>
  <script src="../lib/smart-back.js"></script>
  <script src="../pwa-register.js"></script>
  <script>
    (function() {
      'use strict';
      
      // Storage keys (matching other modules)
      const STORAGE_KEYS = {
        SHABADS: 'gurbani_favorite_shabads',
        BOOKMARKS: 'sehajPaathBookmarks',
        NOTES: 'gurbani_notes_v2'
      };
      
      // Tab switching
      const tabs = document.querySelectorAll('.tab');
      const tabContents = document.querySelectorAll('.tab-content');
      const addNoteBtn = document.getElementById('addNoteBtn');
      
      tabs.forEach(tab => {
        tab.addEventListener('click', () => {
          tabs.forEach(t => t.classList.remove('tab--active'));
          tab.classList.add('tab--active');
          
          tabContents.forEach(tc => tc.classList.remove('tab-content--active'));
          const targetTab = document.getElementById(`${tab.dataset.tab}Tab`);
          if (targetTab) targetTab.classList.add('tab-content--active');
          
          // Show/hide Add Note button based on tab
          if (addNoteBtn) {
            addNoteBtn.classList.toggle('hidden', tab.dataset.tab !== 'notes');
          }
        });
      });
      
      // Load favorites
      function loadFavorites() {
        loadShabads();
        loadBookmarks();
        loadNotes();
      }
      
      function loadShabads() {
        const container = document.getElementById('shabadsList');
        const countEl = document.getElementById('shabadCount');
        
        try {
          const shabads = JSON.parse(localStorage.getItem(STORAGE_KEYS.SHABADS) || '[]');
          countEl.textContent = shabads.length;
          
          if (shabads.length === 0) {
            container.innerHTML = `
              <div class="empty-state">
                <div class="empty-state__icon">📖</div>
                <h3 class="empty-state__title">No saved Shabads</h3>
                <p class="empty-state__desc">Save Shabads from Gurbani Khoj or Random Shabad</p>
              </div>
            `;
            return;
          }
          
          container.innerHTML = shabads.map((shabad, i) => `
            <div class="fav-card" data-index="${i}" data-type="shabad" data-shabadid="${shabad.shabadId || shabad.id || ''}">
              <div class="fav-card__header">
                <span class="fav-card__type">${shabad.source || 'Shabad'}</span>
                <div class="fav-card__actions">
                  <button class="fav-card__action" onclick="event.stopPropagation(); shareShabad(${i})" title="Share">
                    <i class="fas fa-share"></i>
                  </button>
                  <button class="fav-card__action fav-card__action--delete" onclick="event.stopPropagation(); deleteShabad(${i})" title="Delete">
                    <i class="fas fa-trash"></i>
                  </button>
                </div>
              </div>
              <div class="fav-card__gurmukhi">${shabad.gurmukhi || ''}</div>
              <div class="fav-card__translation">${shabad.translation || shabad.english || ''}</div>
              <div class="fav-card__meta">
                <span class="fav-card__meta-item">
                  <i class="fas fa-book"></i> Ang ${shabad.ang || '—'}
                </span>
                <span class="fav-card__meta-item">
                  <i class="fas fa-clock"></i> ${formatDate(shabad.savedAt)}
                </span>
              </div>
              <button class="fav-card__read-btn" onclick="openShabad(${i})">
                <i class="fas fa-book-open"></i> Read Full Shabad
              </button>
            </div>
          `).join('');
        } catch (e) {
          console.error('Error loading shabads:', e);
          container.innerHTML = '<div class="empty-state"><div class="empty-state__icon">❌</div><h3 class="empty-state__title">Error loading</h3></div>';
        }
      }
      
      function loadBookmarks() {
        const container = document.getElementById('bookmarksList');
        const countEl = document.getElementById('bookmarkCount');
        
        try {
          const bookmarks = JSON.parse(localStorage.getItem(STORAGE_KEYS.BOOKMARKS) || '[]');
          countEl.textContent = bookmarks.length;
          
          if (bookmarks.length === 0) {
            container.innerHTML = `
              <div class="empty-state">
                <div class="empty-state__icon">🔖</div>
                <h3 class="empty-state__title">No bookmarked Ang</h3>
                <p class="empty-state__desc">Bookmark pages in Sehaj Paath Reader</p>
              </div>
            `;
            return;
          }
          
          container.innerHTML = bookmarks.map((bm, i) => `
            <div class="fav-card" onclick="window.location.href='../SehajPaath/reader.html?ang=${bm.ang}'">
              <div class="fav-card__header">
                <span class="fav-card__type">Ang ${bm.ang}</span>
                <div class="fav-card__actions">
                  <button class="fav-card__action fav-card__action--delete" onclick="event.stopPropagation(); deleteBookmark(${i})" title="Delete">
                    <i class="fas fa-trash"></i>
                  </button>
                </div>
              </div>
              <div class="fav-card__translation">${bm.note || 'Bookmarked page'}</div>
              <div class="fav-card__meta">
                <span class="fav-card__meta-item">
                  <i class="fas fa-clock"></i> ${formatDate(bm.timestamp)}
                </span>
              </div>
            </div>
          `).join('');
        } catch (e) {
          console.error('Error loading bookmarks:', e);
        }
      }
      
      function loadNotes() {
        const container = document.getElementById('notesList');
        const countEl = document.getElementById('noteCount');
        
        try {
          const notes = JSON.parse(localStorage.getItem(STORAGE_KEYS.NOTES) || '[]');
          countEl.textContent = notes.length;
          
          if (notes.length === 0) {
            container.innerHTML = `
              <div class="empty-state">
                <div class="empty-state__icon">📝</div>
                <h3 class="empty-state__title">No notes yet</h3>
                <p class="empty-state__desc">Add notes while reading in Sehaj Paath</p>
              </div>
            `;
            return;
          }
          
          container.innerHTML = notes.map((note, i) => `
            <div class="fav-card" onclick="window.location.href='../Notes/notes.html'">
              <div class="fav-card__header">
                <span class="fav-card__type">Gurbani Note</span>
                <div class="fav-card__actions">
                  <button class="fav-card__action fav-card__action--delete" onclick="event.stopPropagation(); deleteNote('${note.id}')" title="Delete">
                    <i class="fas fa-trash"></i>
                  </button>
                </div>
              </div>
              <div class="fav-card__translation">${note.title || 'Untitled Note'}</div>
              <div class="fav-card__meta">
                <span class="fav-card__meta-item">
                  <i class="fas fa-clock"></i> ${formatDate(note.modifiedAt || note.timestamp || Date.now())}
                </span>
              </div>
            </div>
          `).join('');
        } catch (e) {
          console.error('Error loading notes:', e);
        }
      }
      
      function formatDate(timestamp) {
        if (!timestamp) return 'Recently';
        const date = new Date(timestamp);
        const now = new Date();
        const diff = now - date;
        
        if (diff < 86400000) return 'Today';
        if (diff < 172800000) return 'Yesterday';
        return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      }
      
      // Global functions for actions
      window.shareShabad = async function(index) {
        const shabads = JSON.parse(localStorage.getItem(STORAGE_KEYS.SHABADS) || '[]');
        const shabad = shabads[index];
        if (!shabad || !window.AnhadShare) return;
        
        await AnhadShare.showPreview({
          gurmukhi: shabad.gurmukhi,
          transliteration: shabad.transliteration || '',
          translation: shabad.translation || shabad.english,
          source: shabad.ang || shabad.source
        });
      };
      
      window.deleteShabad = function(index) {
        if (!confirm('Remove this Shabad from favorites?')) return;
        const shabads = JSON.parse(localStorage.getItem(STORAGE_KEYS.SHABADS) || '[]');
        shabads.splice(index, 1);
        localStorage.setItem(STORAGE_KEYS.SHABADS, JSON.stringify(shabads));
        loadShabads();
      };
      
      window.deleteBookmark = function(index) {
        if (!confirm('Remove this bookmark?')) return;
        const bookmarks = JSON.parse(localStorage.getItem(STORAGE_KEYS.BOOKMARKS) || '[]');
        bookmarks.splice(index, 1);
        localStorage.setItem(STORAGE_KEYS.BOOKMARKS, JSON.stringify(bookmarks));
        loadBookmarks();
      };
      
      window.deleteNote = function(noteId) {
        if (!confirm('Delete this note?')) return;
        const notes = JSON.parse(localStorage.getItem(STORAGE_KEYS.NOTES) || '[]');
        const updatedNotes = notes.filter(n => n.id !== noteId);
        localStorage.setItem(STORAGE_KEYS.NOTES, JSON.stringify(updatedNotes));
        loadNotes();
      };
      
      // Open Shabad in reader
      window.openShabad = function(index) {
        const shabads = JSON.parse(localStorage.getItem(STORAGE_KEYS.SHABADS) || '[]');
        const shabad = shabads[index];
        if (!shabad) return;
        
        const shabadId = shabad.shabadId || shabad.id;
        if (shabadId) {
          // Navigate to shabad reader
          window.location.href = `../GurbaniKhoj/shabad-reader.html?shabad=${shabadId}`;
        } else {
          // Fallback: if no shabadId, try to search by ang
          if (shabad.ang) {
            window.location.href = `../SehajPaath/reader.html?ang=${shabad.ang}`;
          } else {
            alert('Cannot open this Shabad - no ID available');
          }
        }
      };
      
      // Add Note Modal
      window.showAddNoteModal = function() {
        const noteText = prompt('Enter your note:');
        if (!noteText || !noteText.trim()) return;
        
        const ang = prompt('Which Ang is this note for? (optional)');
        
        const notes = JSON.parse(localStorage.getItem(STORAGE_KEYS.NOTES) || '[]');
        notes.unshift({
          text: noteText.trim(),
          ang: ang ? parseInt(ang) : null,
          timestamp: Date.now()
        });
        localStorage.setItem(STORAGE_KEYS.NOTES, JSON.stringify(notes));
        loadNotes();
      };
      
      // Initialize
      loadFavorites();
    })();
  </script>
  
  <!-- Theme Icon Update Script -->
  <script>
    (function() {
      const themeIcon = document.getElementById('themeIcon');
      
      function updateThemeIcon() {
        if (!themeIcon || !window.AnhadTheme) return;
        const isDark = window.AnhadTheme.isDark();
        themeIcon.className = isDark ? 'fas fa-moon' : 'fas fa-sun';
      }
      
      // Update icon on page load
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', updateThemeIcon);
      } else {
        updateThemeIcon();
      }
      
      // Listen for theme changes
      window.addEventListener('themechange', updateThemeIcon);
    })();
  </script>
</body>
</html>
